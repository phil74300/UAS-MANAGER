<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>UAS Manager — REX / Incidents</title>
<style>
:root{
  --navy:#0C447C;--blue:#185FA5;--light-blue:#E6F1FB;
  --green:#1D6B37;--light-green:#E8F5E9;
  --amber:#BA7517;--light-amber:#FAEEDA;
  --red:#8B2020;--light-red:#FDECEC;
  --teal:#006064;--light-teal:#E0F2F1;
  --bg:#F0F4FA;--surface:#FFFFFF;--surface2:#F8FAFD;
  --text:#0D1220;--text-muted:#5A6478;--border:#D0DCF0;
  --shadow:0 2px 12px rgba(12,68,124,.10);
  --radius:14px;--header-h:56px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#0D1220;--surface:#161E30;--surface2:#1C2840;--text:#E8EEF8;--text-muted:#7A8BAA;--border:#253050;--light-blue:#1A2D4A;--light-amber:#2A1E00;--light-green:#0F2318;--light-red:#2A0D0D;--light-teal:#003030;}
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;font-family:-apple-system,'SF Pro Text',BlinkMacSystemFont,system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
#header{position:sticky;top:0;z-index:200;background:var(--navy);display:flex;align-items:center;justify-content:space-between;padding:env(safe-area-inset-top) 16px 0;height:calc(var(--header-h) + env(safe-area-inset-top));box-shadow:0 2px 12px rgba(12,68,124,.3);overflow:hidden;}
#header::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 80%,rgba(139,32,32,.3),transparent 60%);pointer-events:none;}
#header h1{font-size:17px;font-weight:800;color:#fff;display:flex;align-items:center;gap:7px;position:relative;z-index:1;}
.back-btn{background:rgba(255,255,255,.14);border:none;border-radius:8px;color:#fff;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:4px;transition:background .15s;position:relative;z-index:1;flex-shrink:0;}
.back-btn:active{background:rgba(255,255,255,.28);}
.hdr-actions{display:flex;gap:8px;align-items:center;position:relative;z-index:1;}
.btn-hdr{background:rgba(255,255,255,.14);border:none;border-radius:8px;color:#fff;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;}
.kpi-strip{display:flex;gap:10px;padding:12px 14px 4px;overflow-x:auto;scrollbar-width:none;}
.kpi-strip::-webkit-scrollbar{display:none;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--blue);border-radius:12px;padding:10px 13px;min-width:90px;flex:1;}
.kpi-card.green{border-top-color:var(--green);}
.kpi-card.amber{border-top-color:var(--amber);}
.kpi-card.red{border-top-color:var(--red);}
.kpi-value{font-size:19px;font-weight:800;color:var(--navy);}
@media(prefers-color-scheme:dark){.kpi-value{color:#7EB8F7;}}
.kpi-label{font-size:10px;color:var(--text-muted);margin-top:3px;line-height:1.2;}
.list-toolbar{padding:10px 14px 6px;display:flex;gap:8px;align-items:center;}
.search-wrap{flex:1;position:relative;}
.search-wrap input{width:100%;padding:9px 12px 9px 34px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;font-family:inherit;outline:none;}
.search-wrap input:focus{border-color:var(--blue);}
.search-wrap::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;}
.btn-add{background:var(--red);color:#fff;border:none;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;}
.filter-row{display:flex;gap:6px;padding:0 14px 8px;overflow-x:auto;scrollbar-width:none;}
.filter-row::-webkit-scrollbar{display:none;}
.chip{background:var(--surface);border:1.5px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--text-muted);cursor:pointer;white-space:nowrap;transition:all .15s;}
.chip.active{background:var(--navy);border-color:var(--navy);color:#fff;}
#list-area{padding:0 14px calc(80px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:10px;margin-top:4px;}
.rex-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);animation:fadeUp .3s both;}
.rex-card.grave{border-color:var(--red);}
.rex-card.modere{border-color:var(--amber);}
.rex-card.cloture{border-color:var(--green);opacity:.85;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.rex-top{display:flex;align-items:flex-start;gap:10px;padding:11px 12px 8px;}
.rex-grav-pill{width:8px;flex-shrink:0;border-radius:4px;align-self:stretch;margin-top:2px;}
.rex-main{flex:1;min-width:0;}
.rex-titre{font-size:14px;font-weight:800;line-height:1.2;}
.rex-meta{font-size:11px;color:var(--text-muted);margin-top:3px;}
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px;white-space:nowrap;flex-shrink:0;}
.badge-grave{background:var(--light-red);color:var(--red);}
.badge-modere{background:var(--light-amber);color:var(--amber);}
.badge-mineur{background:var(--light-blue);color:var(--blue);}
.badge-info{background:var(--light-teal);color:var(--teal);}
.badge-cloture{background:var(--light-green);color:var(--green);}
.rex-body{padding:0 12px 10px;display:flex;flex-direction:column;gap:6px;}
.rex-field-label{font-size:9px;font-weight:700;text-transform:uppercase;color:var(--text-muted);letter-spacing:.5px;}
.rex-field-val{font-size:12px;color:var(--text);line-height:1.4;}
.rex-foot{padding:8px 12px;background:rgba(0,0,0,.02);display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);gap:8px;flex-wrap:wrap;}
.rex-status-row{display:flex;gap:6px;}
.btn-sm{border:none;border-radius:7px;padding:5px 11px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-edit{background:var(--light-blue);color:var(--blue);}
.btn-del{background:var(--light-red);color:var(--red);}
.btn-cloture{background:var(--light-green);color:var(--green);}
.dsac-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:8px;background:var(--light-amber);color:var(--amber);}
.empty-state{text-align:center;padding:50px 20px;color:var(--text-muted);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-box{background:var(--surface);width:100%;max-width:640px;margin:0 auto;border-radius:22px 22px 0 0;max-height:93vh;overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateY(100%);transition:transform .32s cubic-bezier(.32,1,.23,1);padding-bottom:calc(28px + env(safe-area-inset-bottom));}
.modal-overlay.open .modal-box{transform:translateY(0);}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;}
.modal-header{padding:14px 16px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:5;}
.modal-title{font-size:17px;font-weight:800;color:var(--red);}
.btn-close{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:6px 13px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text-muted);font-family:inherit;}
.form-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
.fsec{font-size:11px;font-weight:800;color:var(--red);text-transform:uppercase;letter-spacing:1px;padding:4px 0 3px;border-bottom:2px solid var(--light-red);margin-top:2px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.frow.tri{grid-template-columns:1fr 1fr 1fr;}
.frow.full{grid-template-columns:1fr;}
.fgroup{display:flex;flex-direction:column;gap:4px;}
.fgroup label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;}
.fgroup input,.fgroup select,.fgroup textarea{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:8px 10px;width:100%;font-family:inherit;-webkit-appearance:none;}
.fgroup input:focus,.fgroup select:focus,.fgroup textarea:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(139,32,32,.12);}
.fgroup textarea{resize:vertical;min-height:60px;}
.submit-row{display:flex;gap:10px;margin-top:6px;}
.btn-submit{flex:1;padding:13px;border-radius:12px;border:none;background:var(--red);color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;}
.btn-cancel{padding:13px 16px;border-radius:12px;border:1.5px solid var(--border);background:transparent;color:var(--text-muted);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:400;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.confirm-overlay.open{opacity:1;pointer-events:all;}
.confirm-box{background:var(--surface);border-radius:18px;padding:24px;max-width:320px;width:90%;text-align:center;}
.confirm-box h3{font-size:17px;font-weight:800;margin-bottom:8px;}
.confirm-box p{font-size:14px;color:var(--text-muted);margin-bottom:18px;}
.confirm-btns{display:flex;gap:10px;}
.confirm-btns button{flex:1;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-cc{background:var(--bg);color:var(--text);}
.btn-cd{background:var(--red);color:#fff;}
#toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(50px);background:var(--navy);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:500;white-space:nowrap;transition:transform .28s cubic-bezier(.34,1.2,.64,1);pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.2);}
#toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<header id="header">
  <h1>⚠️ REX / Incidents</h1>
  <div class="hdr-actions">
    <button class="btn-hdr" onclick="openModal()" title="Nouvel incident">＋</button>
    <a class="back-btn" href="index.html">← Accueil</a>
  </div>
</header>

<div class="kpi-strip">
  <div class="kpi-card red"><div class="kpi-value" id="kpiTotal">0</div><div class="kpi-label">Total REX</div></div>
  <div class="kpi-card amber"><div class="kpi-value" id="kpiOuverts">0</div><div class="kpi-label">Ouverts</div></div>
  <div class="kpi-card green"><div class="kpi-value" id="kpiClotures">0</div><div class="kpi-label">Clôturés</div></div>
  <div class="kpi-card"><div class="kpi-value" id="kpiDsac">0</div><div class="kpi-label">Décl. DSAC</div></div>
</div>

<div class="list-toolbar">
  <div class="search-wrap"><input type="text" id="searchInput" placeholder="Rechercher incident…" oninput="renderList()"></div>
  <button class="btn-add" onclick="openModal()">＋ REX</button>
</div>

<div class="filter-row">
  <div class="chip active" data-filter="all" onclick="setFilter(this,'all')">Tous</div>
  <div class="chip" data-filter="grave" onclick="setFilter(this,'grave')">🔴 Grave</div>
  <div class="chip" data-filter="modere" onclick="setFilter(this,'modere')">🟠 Modéré</div>
  <div class="chip" data-filter="mineur" onclick="setFilter(this,'mineur')">🟡 Mineur</div>
  <div class="chip" data-filter="ouvert" onclick="setFilter(this,'ouvert')">🔓 Ouverts</div>
  <div class="chip" data-filter="cloture" onclick="setFilter(this,'cloture')">✅ Clôturés</div>
  <div class="chip" data-filter="dsac" onclick="setFilter(this,'dsac')">📋 DSAC</div>
</div>

<div id="list-area"></div>

<!-- ═══ MODAL SAISIE ═══ -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Nouvel incident / REX</span>
      <button class="btn-close" onclick="closeModal()">Fermer</button>
    </div>
    <div class="form-body">
      <div class="fsec">📋 Identification</div>
      <div class="frow">
        <div class="fgroup"><label>Date *</label><input type="date" id="fDate" required></div>
        <div class="fgroup"><label>Heure</label><input type="time" id="fHeure"></div>
      </div>
      <div class="frow">
        <div class="fgroup"><label>Site de vol</label><input type="text" id="fSite" placeholder="Lieu de l'événement"></div>
        <div class="fgroup"><label>UAS</label><input type="text" id="fUAS" placeholder="DJI Mavic 4 Pro"></div>
      </div>

      <div class="fsec">⚠️ Événement</div>
      <div class="frow">
        <div class="fgroup">
          <label>Type d'événement *</label>
          <select id="fType" required>
            <option value="">-- Choisir --</option>
            <option>Perte de liaison</option>
            <option>Défaillance matérielle</option>
            <option>Atterrissage d'urgence</option>
            <option>Conflit trafic aérien</option>
            <option>Violation espace aérien</option>
            <option>Blessure / dommages tiers</option>
            <option>Crash / crash-land</option>
            <option>Incendie batterie</option>
            <option>Perte de contrôle</option>
            <option>Anomalie GPS / navigation</option>
            <option>Conditions météo dégradées</option>
            <option>Autre</option>
          </select>
        </div>
        <div class="fgroup">
          <label>Phase de vol</label>
          <select id="fPhase">
            <option value="">--</option>
            <option>Pré-vol</option><option>Décollage</option>
            <option>En vol</option><option>Atterrissage</option><option>Post-vol</option>
          </select>
        </div>
      </div>
      <div class="frow">
        <div class="fgroup">
          <label>Gravité *</label>
          <select id="fGravite" required>
            <option value="">--</option>
            <option value="info">ℹ️ Information</option>
            <option value="mineur">🟡 Mineur</option>
            <option value="modere">🟠 Modéré</option>
            <option value="grave">🔴 Grave</option>
          </select>
        </div>
        <div class="fgroup">
          <label>RPIC impliqué</label>
          <input type="text" id="fRPIC" placeholder="Prénom Nom">
        </div>
      </div>
      <div class="frow full">
        <div class="fgroup"><label>Description de l'événement *</label><textarea id="fDesc" rows="4" placeholder="Décrivez les faits de manière factuelle et chronologique…" required></textarea></div>
      </div>

      <div class="fsec">🔍 Analyse</div>
      <div class="frow full">
        <div class="fgroup"><label>Facteurs contributifs</label><textarea id="fFacteurs" rows="2" placeholder="Conditions météo, fatigue, équipement défaillant…"></textarea></div>
      </div>
      <div class="frow full">
        <div class="fgroup"><label>Actions correctives</label><textarea id="fActions" rows="2" placeholder="Mesures prises immédiatement et à long terme…"></textarea></div>
      </div>

      <div class="fsec">📋 Déclaration & Statut</div>
      <div class="frow">
        <div class="fgroup">
          <label>Statut</label>
          <select id="fStatut">
            <option value="ouvert">🔓 Ouvert</option>
            <option value="en_cours">🔄 En cours</option>
            <option value="cloture">✅ Clôturé</option>
          </select>
        </div>
        <div class="fgroup">
          <label>Déclaration DSAC</label>
          <select id="fDsac">
            <option value="non">Non requise</option>
            <option value="a_faire">À faire</option>
            <option value="faite">Faite</option>
          </select>
        </div>
      </div>
      <div class="frow">
        <div class="fgroup"><label>Date déclaration DSAC</label><input type="date" id="fDsacDate"></div>
        <div class="fgroup"><label>N° déclaration DSAC</label><input type="text" id="fDsacNum" placeholder="Référence DSAC"></div>
      </div>
      <div class="frow full">
        <div class="fgroup"><label>Enseignements tirés (leçons apprises)</label><textarea id="fLecons" rows="2" placeholder="Que retenir de cet événement pour améliorer la sécurité ?"></textarea></div>
      </div>
      <div class="frow full">
        <div class="fgroup"><label>Date de clôture</label><input type="date" id="fDateCloture"></div>
      </div>

      <div class="submit-row">
        <button class="btn-submit" onclick="saveRex()">💾 Enregistrer REX</button>
        <button class="btn-cancel" onclick="closeModal()">✕ Annuler</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal clôture rapide -->
<div class="modal-overlay" id="clotureModal" onclick="closeCloture(event)">
  <div class="modal-box" style="max-height:70vh;">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" style="color:var(--green);">✅ Clôturer le REX</span>
      <button class="btn-close" onclick="document.getElementById('clotureModal').classList.remove('open');document.body.style.overflow=''">Fermer</button>
    </div>
    <div class="form-body">
      <div class="fgroup"><label>Enseignements tirés *</label><textarea id="clotureLecons" rows="3" placeholder="Résumez les leçons apprises…" required></textarea></div>
      <div class="fgroup"><label>Actions correctives finales</label><textarea id="clotureActions" rows="2" placeholder="Actions définitivement mises en place…"></textarea></div>
      <div class="frow">
        <div class="fgroup"><label>Date de clôture</label><input type="date" id="clotureDate"></div>
        <div class="fgroup">
          <label>Déclaration DSAC</label>
          <select id="clotureDsac"><option value="non">Non requise</option><option value="faite">Faite</option></select>
        </div>
      </div>
      <div class="submit-row">
        <button class="btn-submit" style="background:var(--green);" onclick="confirmCloture()">✅ Clôturer</button>
        <button class="btn-cancel" onclick="document.getElementById('clotureModal').classList.remove('open');document.body.style.overflow=''">Annuler</button>
      </div>
    </div>
  </div>
</div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3>Supprimer ce REX ?</h3>
    <p>Cette action est irréversible.</p>
    <div class="confirm-btns">
      <button class="btn-cc" onclick="cancelDel()">Annuler</button>
      <button class="btn-cd" onclick="confirmDel()">Supprimer</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
'use strict';
const KEY='uas_rex';
let items=[],editId=null,deleteId=null,clotureId=null,activeFilter='all';
function load(){try{items=JSON.parse(localStorage.getItem(KEY))||[];}catch{items=[];}}
function save(){localStorage.setItem(KEY,JSON.stringify(items));}
let toastTimer;
function toast(msg,color='var(--navy)'){const t=document.getElementById('toast');t.textContent=msg;t.style.background=color;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2600);}

function updateKPIs(){
  const total=items.length;
  const ouverts=items.filter(i=>i.statut!=='cloture').length;
  const clotures=items.filter(i=>i.statut==='cloture').length;
  const dsac=items.filter(i=>i.dsac==='faite').length;
  document.getElementById('kpiTotal').textContent=total;
  document.getElementById('kpiOuverts').textContent=ouverts;
  document.getElementById('kpiClotures').textContent=clotures;
  document.getElementById('kpiDsac').textContent=dsac;
}

function setFilter(el,f){document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));el.classList.add('active');activeFilter=f;renderList();}

function renderList(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const c=document.getElementById('list-area');
  let list=[...items];
  if(activeFilter==='grave')list=list.filter(i=>i.gravite==='grave');
  else if(activeFilter==='modere')list=list.filter(i=>i.gravite==='modere');
  else if(activeFilter==='mineur')list=list.filter(i=>i.gravite==='mineur');
  else if(activeFilter==='ouvert')list=list.filter(i=>i.statut!=='cloture');
  else if(activeFilter==='cloture')list=list.filter(i=>i.statut==='cloture');
  else if(activeFilter==='dsac')list=list.filter(i=>i.dsac==='a_faire'||i.dsac==='faite');
  if(q)list=list.filter(i=>(i.desc||'').toLowerCase().includes(q)||(i.type||'').toLowerCase().includes(q)||(i.site||'').toLowerCase().includes(q));
  list.sort((a,b)=>b.date.localeCompare(a.date));
  if(!list.length){c.innerHTML=`<div class="empty-state"><p style="font-size:48px;margin-bottom:12px;">⚠️</p><p>${q||activeFilter!=='all'?'Aucun résultat.':'Aucun événement REX enregistré.'}</p></div>`;return;}
  const gravPill={grave:'var(--red)',modere:'var(--amber)',mineur:'#D4A017',info:'var(--teal)'};
  const gravBadge={grave:'badge-grave',modere:'badge-modere',mineur:'badge-mineur',info:'badge-info'};
  const gravTxt={grave:'🔴 Grave',modere:'🟠 Modéré',mineur:'🟡 Mineur',info:'ℹ️ Info'};
  const statTxt={ouvert:'🔓 Ouvert',en_cours:'🔄 En cours',cloture:'✅ Clôturé'};
  c.innerHTML=list.map((item,i)=>{
    const isCloture=item.statut==='cloture';
    return `<div class="rex-card ${item.gravite} ${isCloture?'cloture':''}" style="animation-delay:${i*.04}s">
      <div class="rex-top">
        <div class="rex-grav-pill" style="background:${gravPill[item.gravite]||'var(--border)'};"></div>
        <div class="rex-main">
          <div class="rex-titre">${item.type||'Événement REX'}</div>
          <div class="rex-meta">${fmtDate(item.date)}${item.heure?' '+item.heure:''}${item.site?' · '+item.site:''}${item.uas?' · '+item.uas:''}</div>
        </div>
        <span class="badge ${gravBadge[item.gravite]||''}">${gravTxt[item.gravite]||item.gravite}</span>
      </div>
      <div class="rex-body">
        ${item.desc?`<div><div class="rex-field-label">Description</div><div class="rex-field-val">${item.desc}</div></div>`:''}
        ${item.facteurs?`<div><div class="rex-field-label">Facteurs contributifs</div><div class="rex-field-val">${item.facteurs}</div></div>`:''}
        ${item.actions?`<div><div class="rex-field-label">Actions correctives</div><div class="rex-field-val" style="color:var(--green);">${item.actions}</div></div>`:''}
        ${item.lecons?`<div><div class="rex-field-label">Enseignements</div><div class="rex-field-val" style="color:var(--blue);">${item.lecons}</div></div>`:''}
      </div>
      <div class="rex-foot">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
          <span class="badge ${isCloture?'badge-cloture':''}" style="${!isCloture?'background:var(--light-amber);color:var(--amber)':''}">${statTxt[item.statut]||'—'}</span>
          ${item.dsac==='a_faire'?'<span class="dsac-badge">⚠️ DSAC à déclarer</span>':''}
          ${item.dsac==='faite'?'<span style="font-size:10px;font-weight:700;padding:3px 9px;border-radius:8px;background:var(--light-green);color:var(--green)">📋 DSAC déclarée</span>':''}
          ${item.rpic?`<span style="font-size:11px;color:var(--text-muted);">RPIC: ${item.rpic}</span>`:''}
        </div>
        <div class="rex-status-row">
          ${!isCloture?`<button class="btn-sm btn-cloture" onclick="openCloture('${item.id}')">✅ Clôturer</button>`:''}
          <button class="btn-sm btn-edit" onclick="openModal('${item.id}')">✏️</button>
          <button class="btn-sm btn-del" onclick="askDel('${item.id}')">🗑</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function openModal(id=null){
  editId=id;document.getElementById('modalTitle').textContent=id?'Modifier REX':'Nouvel incident / REX';
  if(id){const it=items.find(x=>x.id===id);if(it)fillForm(it);}else{clearForm();}
  document.getElementById('modalOverlay').classList.add('open');document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');document.body.style.overflow='';}
function closeModalOutside(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}

function clearForm(){
  ['fDate','fHeure','fSite','fUAS','fType','fPhase','fGravite','fRPIC','fDesc','fFacteurs','fActions','fStatut','fDsac','fDsacDate','fDsacNum','fLecons','fDateCloture'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  document.getElementById('fDate').value=new Date().toISOString().slice(0,10);
  document.getElementById('fStatut').value='ouvert';
  document.getElementById('fDsac').value='non';
  try{const c=JSON.parse(localStorage.getItem('uas_config')||'{}');const d=(c.drones||[]).find(x=>x.primary)||{};if(d.nom)document.getElementById('fUAS').value=d.nom;const p=(c.pilots||[]).find(x=>x.primary)||{};if(p.nom)document.getElementById('fRPIC').value=p.nom;}catch{}
}
function fillForm(it){
  const map={fDate:'date',fHeure:'heure',fSite:'site',fUAS:'uas',fType:'type',fPhase:'phase',fGravite:'gravite',fRPIC:'rpic',fDesc:'desc',fFacteurs:'facteurs',fActions:'actions',fStatut:'statut',fDsac:'dsac',fDsacDate:'dsacDate',fDsacNum:'dsacNum',fLecons:'lecons',fDateCloture:'dateCloture'};
  Object.entries(map).forEach(([id,key])=>{const el=document.getElementById(id);if(el&&it[key]!=null)el.value=it[key];});
}
function saveRex(){
  const date=gv('fDate'),type=gv('fType'),gravite=gv('fGravite'),desc=gv('fDesc').trim();
  if(!date||!type||!gravite||!desc){toast('⚠️ Date, type, gravité et description obligatoires','var(--amber)');return;}
  const item={id:editId||crypto.randomUUID(),date,heure:gv('fHeure'),site:gv('fSite'),uas:gv('fUAS'),type,phase:gv('fPhase'),gravite,rpic:gv('fRPIC'),desc,facteurs:gv('fFacteurs'),actions:gv('fActions'),statut:gv('fStatut'),dsac:gv('fDsac'),dsacDate:gv('fDsacDate'),dsacNum:gv('fDsacNum'),lecons:gv('fLecons'),dateCloture:gv('fDateCloture'),createdAt:editId?(items.find(x=>x.id===editId)?.createdAt||new Date().toISOString()):new Date().toISOString()};
  if(editId){const i=items.findIndex(x=>x.id===editId);if(i!==-1)items[i]=item;}else items.push(item);
  save();closeModal();renderAll();toast(editId?'✅ REX mis à jour':'✅ REX enregistré','var(--green)');
}

function openCloture(id){
  clotureId=id;
  document.getElementById('clotureDate').value=new Date().toISOString().slice(0,10);
  document.getElementById('clotureModal').classList.add('open');document.body.style.overflow='hidden';
}
function closeCloture(e){if(e.target===document.getElementById('clotureModal')){document.getElementById('clotureModal').classList.remove('open');document.body.style.overflow='';}}
function confirmCloture(){
  const lecons=document.getElementById('clotureLecons').value.trim();
  if(!lecons){toast('⚠️ Veuillez renseigner les enseignements','var(--amber)');return;}
  const i=items.findIndex(x=>x.id===clotureId);
  if(i!==-1){items[i].statut='cloture';items[i].lecons=lecons;items[i].actions=document.getElementById('clotureActions').value||items[i].actions;items[i].dateCloture=document.getElementById('clotureDate').value;items[i].dsac=document.getElementById('clotureDsac').value;}
  save();document.getElementById('clotureModal').classList.remove('open');document.body.style.overflow='';renderAll();toast('✅ REX clôturé avec succès','var(--green)');
}

function askDel(id){deleteId=id;document.getElementById('confirmOverlay').classList.add('open');}
function cancelDel(){deleteId=null;document.getElementById('confirmOverlay').classList.remove('open');}
function confirmDel(){if(deleteId){items=items.filter(x=>x.id!==deleteId);save();renderAll();toast('🗑 REX supprimé');}cancelDel();}
function gv(id){const el=document.getElementById(id);return el?el.value:'';}
function fmtDate(d){if(!d)return'—';const[y,m,j]=d.split('-');return`${j}/${m}/${y}`;}
function renderAll(){updateKPIs();renderList();}
load();renderAll();
</script>
</body>
</html>
