<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check-list Vol</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, Helvetica, Arial, sans-serif; background: #f0f4f8; color: #1a1a2e; font-size: 16px; }

#header { background: #0C447C; padding: 16px; }
#header h1 { color: #fff; font-size: 20px; font-weight: 700; margin-bottom: 4px; }
#header p { color: rgba(255,255,255,0.7); font-size: 12px; margin-bottom: 12px; }
#miss-row { display: table; width: 100%; background: rgba(255,255,255,0.15); border-radius: 8px; padding: 8px 10px; }
#miss-lbl { display: table-cell; color: rgba(255,255,255,0.85); font-size: 13px; white-space: nowrap; vertical-align: middle; padding-right: 8px; }
#missionId { display: table-cell; width: 100%; background: transparent; border: none; outline: none; color: #fff; font-size: 14px; font-weight: 600; font-family: inherit; vertical-align: middle; }
#miss-hist { display: table-cell; background: none; border: none; color: #fff; font-size: 18px; cursor: pointer; padding-left: 8px; vertical-align: middle; }

#seg-bar { background: #fff; padding: 10px 16px; border-bottom: 1px solid #d0dce8; }
#seg-inner { background: #f0f4f8; border-radius: 10px; padding: 3px; display: table; width: 100%; }
.seg-btn { display: table-cell; width: 50%; text-align: center; padding: 10px 4px; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; background: transparent; color: #5a6070; }
.seg-btn.on { background: #0C447C; color: #fff; }

#prog-wrap { background: #fff; padding: 12px 16px; border-bottom: 1px solid #d0dce8; }
#prog-row { display: table; width: 100%; margin-bottom: 6px; }
#prog-lbl { display: table-cell; font-size: 12px; color: #5a6070; vertical-align: middle; }
#prog-pct { display: table-cell; font-size: 20px; font-weight: 800; color: #0C447C; text-align: right; vertical-align: middle; }
#prog-track { background: #d0dce8; border-radius: 4px; height: 8px; overflow: hidden; }
#prog-fill { height: 8px; background: #1D6B37; width: 0%; border-radius: 4px; }
#prog-stats { font-size: 12px; color: #5a6070; margin-top: 6px; }

#act-bar { background: #fff; padding: 10px 16px; border-bottom: 1px solid #d0dce8; display: table; width: 100%; }
#act-bar .abtn { display: table-cell; width: 33%; text-align: center; padding: 9px 4px; border: 1.5px solid #d0dce8; font-size: 12px; font-weight: 600; font-family: inherit; cursor: pointer; background: #fff; color: #1a1a2e; border-radius: 8px; }
#act-bar .abtn:nth-child(2) { margin: 0 6px; }
.abtn-ok { background: #E8F5E9 !important; border-color: #1D6B37 !important; color: #1D6B37 !important; }
.abtn-ko { background: #FDECEC !important; border-color: #8B2020 !important; color: #8B2020 !important; }
.abtn-am { background: #FAEEDA !important; border-color: #BA7517 !important; color: #BA7517 !important; }

#banner { background: #FDECEC; border: 1.5px solid #8B2020; border-radius: 10px; margin: 10px 16px 0; padding: 12px 14px; display: none; }
#banner.go { background: #E8F5E9; border-color: #1D6B37; }
#banner.nogo { background: #FDECEC; border-color: #8B2020; }
#b-title { font-size: 15px; font-weight: 800; margin-bottom: 3px; }
#banner.go #b-title { color: #1D6B37; }
#banner.nogo #b-title { color: #8B2020; }
#b-desc { font-size: 12px; color: #5a6070; }
#btn-ov { display: none; margin-top: 10px; width: 100%; background: #8B2020; color: #fff; border: none; border-radius: 8px; padding: 10px; font-size: 13px; font-weight: 700; font-family: inherit; cursor: pointer; }

.sec-lbl { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #5a6070; padding: 14px 16px 5px; background: #f0f4f8; }
.item { background: #fff; border-left: 3px solid transparent; margin-bottom: 1px; padding: 12px 14px 12px 44px; position: relative; cursor: pointer; }
.item.crit { border-left-color: #BA7517; }
.item.done { background: #E8F5E9; border-left-color: #1D6B37; }
.chk { position: absolute; left: 12px; top: 13px; width: 22px; height: 22px; border: 2px solid #d0dce8; border-radius: 6px; background: #f0f4f8; text-align: center; line-height: 18px; font-size: 13px; font-weight: 700; color: transparent; }
.item.done .chk { background: #1D6B37; border-color: #1D6B37; color: #fff; }
.item-txt { font-size: 14px; font-weight: 600; line-height: 1.3; color: #1a1a2e; }
.item.done .item-txt { color: #1D6B37; text-decoration: line-through; }
.item-sub { font-size: 11px; color: #5a6070; margin-top: 2px; }
.tag-c { display: inline-block; background: #FAEEDA; border: 1px solid #BA7517; color: #BA7517; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 4px; margin-top: 4px; }
.item.done .tag-c { background: #E8F5E9; border-color: #1D6B37; color: #1D6B37; }
.tag-t { font-size: 11px; color: #5a6070; margin-top: 4px; margin-left: 6px; display: inline-block; }

#save-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #d0dce8; padding: 10px 16px 20px; display: table; width: 100%; }
#btn-hist-b { display: table-cell; width: 48px; background: #f0f4f8; border: 1.5px solid #d0dce8; border-radius: 8px; font-size: 18px; cursor: pointer; text-align: center; padding: 10px; vertical-align: middle; }
#btn-save { display: table-cell; padding-left: 8px; vertical-align: middle; }
#btn-save button { width: 100%; background: #0C447C; color: #fff; border: none; border-radius: 8px; padding: 13px; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; }

#spacer { height: 90px; }

/* MODALS */
.ov { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; }
.ov.show { display: block; }
.modal { position: absolute; bottom: 0; left: 0; right: 0; background: #fff; border-radius: 20px 20px 0 0; padding: 20px 20px 36px; }
.modal-hdl { width: 36px; height: 4px; background: #d0dce8; border-radius: 2px; margin: 0 auto 16px; }
.modal-t { font-size: 17px; font-weight: 800; margin-bottom: 8px; }
.modal-t.red { color: #8B2020; }
.modal-t.blue { color: #0C447C; }
.modal-body { font-size: 14px; color: #5a6070; line-height: 1.5; margin-bottom: 16px; }
.mbtn { display: block; width: 100%; padding: 14px; border-radius: 10px; border: none; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; margin-bottom: 10px; text-align: center; }
.mbtn.red { background: #8B2020; color: #fff; }
.mbtn.grey { background: #f0f4f8; color: #1a1a2e; border: 1.5px solid #d0dce8; }

.hist-item { padding: 12px 0; border-bottom: 1px solid #d0dce8; display: table; width: 100%; cursor: pointer; }
.hist-ico { display: table-cell; font-size: 20px; vertical-align: middle; padding-right: 10px; }
.hist-info { display: table-cell; vertical-align: middle; }
.hist-name { font-weight: 700; font-size: 14px; }
.hist-meta { font-size: 12px; color: #5a6070; margin-top: 2px; }
.hist-arr { display: table-cell; vertical-align: middle; color: #185FA5; font-weight: 700; font-size: 16px; }

#toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #1a1a2e; color: #fff; border-radius: 20px; padding: 8px 18px; font-size: 13px; font-weight: 600; z-index: 300; white-space: nowrap; display: none; }
</style>
</head>
<body>

<div id="header">
  <h1>✅ Check-list de vol</h1>
  <p>CONTE Philippe · FRAjqq48j12nfy4c · DJI Mavic 4 Pro</p>
  <div id="miss-row">
    <span id="miss-lbl">Mission :</span>
    <input id="missionId" placeholder="Ex: M2025-001" maxlength="30">
    <button id="miss-hist" onclick="showHist()">📋</button>
  </div>
</div>

<div id="seg-bar">
  <div id="seg-inner">
    <button class="seg-btn on" id="btnPre" onclick="switchPhase('pre')">🛫 Pré-vol (<span id="cntPre">0/0</span>)</button><button class="seg-btn" id="btnPost" onclick="switchPhase('post')">🛬 Post-vol (<span id="cntPost">0/0</span>)</button>
  </div>
</div>

<div id="prog-wrap">
  <div id="prog-row">
    <span id="prog-lbl">Progression</span>
    <span id="prog-pct">0%</span>
  </div>
  <div id="prog-track"><div id="prog-fill"></div></div>
  <div id="prog-stats">✅ <b id="nOk">0</b> cochés &nbsp;⭐ <b id="nCrit">0</b> critiques restants &nbsp;📋 <b id="nTot">0</b> total</div>
</div>

<div id="act-bar">
  <button class="abtn abtn-ok" onclick="checkAll()">☑ Tout cocher</button>
  <button class="abtn abtn-ko" onclick="document.getElementById('ovReset').className='ov show'">↺ Reset</button>
  <button class="abtn abtn-am" onclick="showGo()">🚦 GO/NO-GO</button>
</div>

<div id="banner">
  <div id="b-title"></div>
  <div id="b-desc"></div>
  <button id="btn-ov" onclick="document.getElementById('ovOv').className='ov show'">Passer outre ▸</button>
</div>

<div id="listContent"></div>
<div id="spacer"></div>

<div id="save-bar">
  <span id="btn-hist-b" onclick="showHist()">📋</span>
  <span id="btn-save"><button onclick="saveMission()">💾 Enregistrer la mission</button></span>
</div>

<!-- MODAL OVERRIDE -->
<div class="ov" id="ovOv">
  <div class="modal">
    <div class="modal-hdl"></div>
    <div class="modal-t red">⚠️ Items critiques non validés</div>
    <div class="modal-body" id="ovOvBody"></div>
    <button class="mbtn red" onclick="doOverride()">⚠️ Autoriser le décollage quand même</button>
    <button class="mbtn grey" onclick="document.getElementById('ovOv').className='ov'">← Retour à la check-list</button>
  </div>
</div>

<!-- MODAL RESET -->
<div class="ov" id="ovReset">
  <div class="modal">
    <div class="modal-hdl"></div>
    <div class="modal-t red">🔄 Réinitialiser ?</div>
    <div class="modal-body">Tous les items de la phase actuelle seront décochés.</div>
    <button class="mbtn red" onclick="doReset()">Réinitialiser</button>
    <button class="mbtn grey" onclick="document.getElementById('ovReset').className='ov'">Annuler</button>
  </div>
</div>

<!-- MODAL HISTORIQUE -->
<div class="ov" id="ovHist">
  <div class="modal">
    <div class="modal-hdl"></div>
    <div class="modal-t blue">📋 Missions sauvegardées</div>
    <div id="histList" style="max-height:45vh;overflow-y:auto;margin-bottom:12px;"></div>
    <button class="mbtn grey" onclick="document.getElementById('ovHist').className='ov'">Fermer</button>
  </div>
</div>

<div id="toast"></div>

<script>
var phase = 'pre';
var mission = '';
var overrideOk = false;

var DATA = {
  pre: [
    { s: '🔋 Batteries & Énergie', items: [
      { id:'p01', t:'Batterie drone ≥ 80%', sub:'Vérifier dans DJI Fly', c:true },
      { id:'p02', t:'Batterie télécommande ≥ 60%', sub:'RC-N2 ou RC 2', c:true },
      { id:'p03', t:'Téléphone/tablette chargé', sub:'Si utilisé comme écran', c:false }
    ]},
    { s: '📋 Documents & Autorisations', items: [
      { id:'p04', t:'N° de mission renseigné', sub:'Traçabilité carnet de vol', c:true },
      { id:'p05', t:'NOTAM consultés — zone libre', sub:'Sofia Briefing / SIA', c:true },
      { id:'p06', t:'Météo vérifiée (vent, visibilité, pluie)', sub:'METAR/TAF ou OpenWeather', c:true },
      { id:'p07', t:'Autorisation préfectorale valide', sub:'PDRA-S02 : notif. 10 jours ouvrés', c:true },
      { id:'p08', t:'Assurance COVERDRONE active', sub:'CDA22411846EUR — exp. 10/04/2027', c:false },
      { id:'p09', t:'CATS valide', sub:'NLD-RP-q99cvjjh51fz — exp. 15/09/2029', c:false }
    ]},
    { s: '🚁 Inspection drone', items: [
      { id:'p10', t:'Bras dépliés et verrouillés (x4)', sub:'DJI Mavic 4 Pro', c:true },
      { id:'p11', t:'Hélices fixées — aucun dommage', sub:'Contrôle visuel de chaque pale', c:true },
      { id:'p12', t:'Cardan libre — protège-cardan retiré', sub:'Caméra sur axe correct', c:true },
      { id:'p13', t:'Capteurs propres (avant/arrière/bas)', sub:'Objectifs sans poussière', c:false },
      { id:'p14', t:'Marquage UAS-FR-517804 visible', sub:'Obligation réglementaire', c:true },
      { id:'p15', t:'Module DRI actif', sub:'FRAjqq48j12nfy4cvsy', c:true }
    ]},
    { s: '📡 Liaison & GPS', items: [
      { id:'p16', t:'Télécommande allumée AVANT le drone', sub:'Procédure DJI obligatoire', c:true },
      { id:'p17', t:'Liaison RC établie (signal vert)', sub:'DJI O4 Pro — min 4 barres', c:true },
      { id:'p18', t:'GPS acquis — min 8 satellites', sub:'Attendre fixe stable', c:true },
      { id:'p19', t:'Hauteur max configurée', sub:'PDRA-S01 : 120m / PDRA-S02 : voir autorisation', c:true },
      { id:'p20', t:'Point RTH défini', sub:'Position décollage confirmée', c:true }
    ]},
    { s: '👥 Zone & Sécurité', items: [
      { id:'p21', t:'Zone dégagée et sécurisée', sub:'Périmètre de sécurité établi', c:true },
      { id:'p22', t:'Observateurs en place si PDRA-S02', sub:'OBS1 / OBS2 — radio OK', c:false },
      { id:'p23', t:'Décision GO prononcée par le CDB', sub:'Commandant de bord : CONTE Philippe', c:true }
    ]}
  ],
  post: [
    { s: '🛬 Atterrissage', items: [
      { id:'q01', t:'Drone immobile — moteurs arrêtés', sub:'Avant toute manipulation', c:true },
      { id:'q02', t:'Drone éteint AVANT la télécommande', sub:'Respecter ordre d\'extinction', c:true },
      { id:'q03', t:'Heure d\'atterrissage notée', sub:'Pour calcul durée de vol', c:false }
    ]},
    { s: '🔋 Batteries post-vol', items: [
      { id:'q04', t:'Niveau batterie relevé', sub:'À consigner dans carnet de vol', c:false },
      { id:'q05', t:'Température batteries < 45°C avant charge', sub:'Laisser refroidir si nécessaire', c:true }
    ]},
    { s: '🔍 Inspection post-vol', items: [
      { id:'q06', t:'Hélices — aucun dommage constaté', sub:'Fissures, éclats, déformation', c:true },
      { id:'q07', t:'Bras repliés correctement', sub:'Position transport', c:false },
      { id:'q08', t:'Protège-cardan remis en place', sub:'Protection transport', c:false },
      { id:'q09', t:'Incident ou anomalie constaté ?', sub:'Si oui → ouvrir fiche REX', c:true }
    ]},
    { s: '📊 Traçabilité', items: [
      { id:'q10', t:'Carnet de vol mis à jour', sub:'Durée, lieu, scénario, conditions', c:true },
      { id:'q11', t:'Médias transférés et sauvegardés', sub:'Photos/vidéos si applicable', c:false },
      { id:'q12', t:'Matériel rangé et inventorié', sub:'Valise, hélices rechange, câbles', c:false }
    ]}
  ]
};

function stKey() { return 'uas_cl_' + (mission || '_tmp'); }
function getS() { try { return JSON.parse(localStorage.getItem(stKey())) || {}; } catch(e) { return {}; } }
function putS(s) { localStorage.setItem(stKey(), JSON.stringify(s)); }
function pad2(n) { return n < 10 ? '0' + n : '' + n; }

function render() {
  var s = getS();
  var list = DATA[phase];
  var html = '';
  for (var i = 0; i < list.length; i++) {
    var sec = list[i];
    html += '<div class="sec-lbl">' + sec.s + '</div>';
    for (var j = 0; j < sec.items.length; j++) {
      var item = sec.items[j];
      var done = !!s[item.id];
      var t = s[item.id + '_t'] || '';
      html += '<div class="item' + (item.c ? ' crit' : '') + (done ? ' done' : '') + '" onclick="toggle(\'' + item.id + '\')">';
      html += '<div class="chk">' + (done ? '✓' : '') + '</div>';
      html += '<div class="item-txt">' + item.t + '</div>';
      html += '<div class="item-sub">' + item.sub + '</div>';
      if (item.c) html += '<span class="tag-c">★ CRITIQUE</span>';
      if (t) html += '<span class="tag-t">✓ ' + t + '</span>';
      html += '</div>';
    }
  }
  document.getElementById('listContent').innerHTML = html;
  updateStats();
}

function toggle(id) {
  var s = getS();
  if (s[id]) {
    delete s[id];
    delete s[id + '_t'];
  } else {
    s[id] = 1;
    var n = new Date();
    s[id + '_t'] = pad2(n.getHours()) + ':' + pad2(n.getMinutes());
  }
  putS(s);
  render();
  document.getElementById('banner').style.display = 'none';
}

function updateStats() {
  var s = getS();
  var list = DATA[phase];
  var tot = 0, chk = 0, crit = 0;
  for (var i = 0; i < list.length; i++) {
    for (var j = 0; j < list[i].items.length; j++) {
      var item = list[i].items[j];
      tot++;
      if (s[item.id]) chk++;
      else if (item.c) crit++;
    }
  }
  var p = tot ? Math.round(chk / tot * 100) : 0;
  document.getElementById('prog-pct').textContent = p + '%';
  var fill = document.getElementById('prog-fill');
  fill.style.width = p + '%';
  fill.style.background = p === 100 ? '#1D6B37' : p > 60 ? '#185FA5' : '#BA7517';
  document.getElementById('nOk').textContent = chk;
  document.getElementById('nCrit').textContent = crit;
  document.getElementById('nTot').textContent = tot;

  // segment counts
  for (var ph in DATA) {
    var t2 = 0, c2 = 0;
    for (var i2 = 0; i2 < DATA[ph].length; i2++) {
      for (var j2 = 0; j2 < DATA[ph][i2].items.length; j2++) {
        t2++;
        if (s[DATA[ph][i2].items[j2].id]) c2++;
      }
    }
    document.getElementById(ph === 'pre' ? 'cntPre' : 'cntPost').textContent = c2 + '/' + t2;
  }
}

function switchPhase(p) {
  phase = p;
  document.getElementById('btnPre').className = 'seg-btn' + (p === 'pre' ? ' on' : '');
  document.getElementById('btnPost').className = 'seg-btn' + (p === 'post' ? ' on' : '');
  document.getElementById('banner').style.display = 'none';
  render();
  window.scrollTo(0, 0);
}

function checkAll() {
  var s = getS();
  var n = new Date();
  var t = pad2(n.getHours()) + ':' + pad2(n.getMinutes());
  var list = DATA[phase];
  for (var i = 0; i < list.length; i++) {
    for (var j = 0; j < list[i].items.length; j++) {
      var id = list[i].items[j].id;
      if (!s[id]) { s[id] = 1; s[id + '_t'] = t; }
    }
  }
  putS(s);
  render();
  toast('✅ Tous les items cochés');
}

function doReset() {
  var s = getS();
  var list = DATA[phase];
  for (var i = 0; i < list.length; i++) {
    for (var j = 0; j < list[i].items.length; j++) {
      var id = list[i].items[j].id;
      delete s[id];
      delete s[id + '_t'];
    }
  }
  overrideOk = false;
  putS(s);
  document.getElementById('ovReset').className = 'ov';
  render();
  toast('🔄 Check-list réinitialisée');
}

function showGo() {
  if (phase !== 'pre') { toast('ℹ️ GO/NO-GO applicable en pré-vol'); return; }
  var s = getS();
  var missing = [];
  var list = DATA.pre;
  for (var i = 0; i < list.length; i++) {
    for (var j = 0; j < list[i].items.length; j++) {
      var item = list[i].items[j];
      if (item.c && !s[item.id]) missing.push(item.t);
    }
  }
  var b = document.getElementById('banner');
  b.style.display = 'block';
  if (missing.length === 0 || overrideOk) {
    b.className = 'go';
    document.getElementById('b-title').textContent = (overrideOk && missing.length) ? '⚠️ GO avec dérogation' : '✅ GO — Décollage autorisé';
    document.getElementById('b-desc').textContent = (overrideOk && missing.length) ? missing.length + ' item(s) non validé(s) — dérogation enregistrée' : 'Tous les items critiques sont validés.';
    document.getElementById('btn-ov').style.display = 'none';
  } else {
    b.className = 'nogo';
    document.getElementById('b-title').textContent = '🚫 NO-GO — Décollage interdit';
    document.getElementById('b-desc').textContent = missing.length + ' item(s) critique(s) non validé(s)';
    document.getElementById('btn-ov').style.display = 'block';
  }
  b.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function doOverride() {
  var s = getS();
  var lines = [];
  var list = DATA.pre;
  for (var i = 0; i < list.length; i++) {
    for (var j = 0; j < list[i].items.length; j++) {
      var item = list[i].items[j];
      if (item.c && !s[item.id]) lines.push('• ' + item.t);
    }
  }
  document.getElementById('ovOvBody').innerHTML = '<strong>Items non validés :</strong><br><br>' + lines.join('<br>') + '<br><br>Autoriser engage votre seule responsabilité de commandant de bord.';
  document.getElementById('ovOv').className = 'ov show';
  overrideOk = true;
  document.getElementById('ovOv').className = 'ov';
  showGo();
  toast('⚠️ Dérogation enregistrée');
}

function saveMission() {
  var id = document.getElementById('missionId').value.trim();
  if (!id) { toast('⚠️ Saisir un N° de mission'); return; }
  mission = id;
  var ml = getML();
  ml[id] = { id: id, date: new Date().toISOString(), ov: overrideOk };
  localStorage.setItem('uas_cl_missions', JSON.stringify(ml));
  putS(getS());
  toast('💾 Mission ' + id + ' sauvegardée');
}

function getML() { try { return JSON.parse(localStorage.getItem('uas_cl_missions')) || {}; } catch(e) { return {}; } }

function showHist() {
  var ml = getML();
  var keys = Object.keys(ml).sort().reverse();
  var html = '';
  if (keys.length === 0) {
    html = '<p style="text-align:center;padding:20px;color:#5a6070">Aucune mission sauvegardée</p>';
  } else {
    for (var i = 0; i < keys.length; i++) {
      var k = keys[i];
      var m = ml[k];
      var d = new Date(m.date).toLocaleDateString('fr-FR');
      html += '<div class="hist-item" onclick="loadMission(\'' + k + '\')">'
        + '<span class="hist-ico">✈️</span>'
        + '<span class="hist-info"><div class="hist-name">' + k + '</div><div class="hist-meta">' + d + (m.ov ? ' · ⚠️ Dérogation' : '') + '</div></span>'
        + '<span class="hist-arr">→</span>'
        + '</div>';
    }
  }
  document.getElementById('histList').innerHTML = html;
  document.getElementById('ovHist').className = 'ov show';
}

function loadMission(id) {
  mission = id;
  document.getElementById('missionId').value = id;
  var ml = getML();
  overrideOk = !!(ml[id] && ml[id].ov);
  document.getElementById('ovHist').className = 'ov';
  render();
  toast('📂 Mission ' + id + ' chargée');
}

document.getElementById('missionId').addEventListener('input', function() {
  mission = this.value.trim();
  overrideOk = false;
});

function toast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(function() { t.style.display = 'none'; }, 2500);
}

render();
</script>
</body>
</html>
