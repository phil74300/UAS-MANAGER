<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check-list Vol UAS</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, Helvetica, Arial, sans-serif; background: #f0f4f8; color: #1a1a2e; }
.hdr { background: #0C447C; padding: 14px 16px; }
.hdr h1 { color: #fff; font-size: 18px; font-weight: bold; margin-bottom: 3px; }
.hdr p { color: #aac8e8; font-size: 11px; margin-bottom: 10px; }
.mrow { background: rgba(255,255,255,0.15); border-radius: 8px; padding: 8px 10px; display: flex; align-items: center; gap: 8px; }
.mrow label { color: #fff; font-size: 12px; white-space: nowrap; }
.mrow input { flex: 1; background: transparent; border: none; outline: none; color: #fff; font-size: 13px; font-family: inherit; }
.mrow input::placeholder { color: rgba(255,255,255,0.4); }
.mrow button { background: rgba(255,255,255,0.2); border: none; border-radius: 6px; color: #fff; font-size: 12px; padding: 5px 8px; cursor: pointer; font-family: inherit; }
.segbar { background: #fff; padding: 10px 16px; border-bottom: 1px solid #d8e4f0; }
.seg { display: flex; background: #f0f4f8; border-radius: 10px; padding: 3px; gap: 3px; }
.seg button { flex: 1; padding: 9px 4px; border: none; border-radius: 8px; font-size: 12px; font-weight: bold; font-family: inherit; cursor: pointer; background: transparent; color: #6b7280; }
.seg button.on { background: #0C447C; color: #fff; }
.progbar { background: #fff; padding: 10px 16px 12px; border-bottom: 1px solid #d8e4f0; }
.progtop { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.progtop span { font-size: 12px; color: #6b7280; }
.progtop strong { font-size: 20px; color: #0C447C; }
.progtrack { background: #d8e4f0; border-radius: 4px; height: 7px; overflow: hidden; }
.progfill { height: 7px; background: #1D6B37; border-radius: 4px; width: 0%; }
.progstats { font-size: 11px; color: #6b7280; margin-top: 5px; }
.actbar { background: #fff; padding: 8px 16px; border-bottom: 1px solid #d8e4f0; display: flex; gap: 6px; }
.actbar button { flex: 1; padding: 9px 4px; border: 1px solid #d8e4f0; border-radius: 8px; font-size: 11px; font-weight: bold; font-family: inherit; cursor: pointer; background: #fff; color: #1a1a2e; }
.btn-ok { background: #E8F5E9 !important; border-color: #1D6B37 !important; color: #1D6B37 !important; }
.btn-ko { background: #FDECEC !important; border-color: #8B2020 !important; color: #8B2020 !important; }
.btn-am { background: #FAEEDA !important; border-color: #BA7517 !important; color: #BA7517 !important; }
.banner { border-radius: 10px; margin: 10px 16px 0; padding: 12px; display: none; }
.banner.go { background: #E8F5E9; border: 1px solid #1D6B37; }
.banner.nogo { background: #FDECEC; border: 1px solid #8B2020; }
.btitle { font-size: 14px; font-weight: bold; margin-bottom: 3px; }
.banner.go .btitle { color: #1D6B37; }
.banner.nogo .btitle { color: #8B2020; }
.bdesc { font-size: 12px; color: #6b7280; }
.btn-ov { display: none; margin-top: 10px; width: 100%; background: #8B2020; color: #fff; border: none; border-radius: 8px; padding: 9px; font-size: 12px; font-weight: bold; font-family: inherit; cursor: pointer; }
.seclbl { font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 0.8px; color: #6b7280; padding: 12px 16px 4px; background: #f0f4f8; }
.item { background: #fff; border-left: 3px solid transparent; margin-bottom: 1px; padding: 11px 14px 11px 44px; position: relative; cursor: pointer; }
.item.crit { border-left-color: #BA7517; }
.item.done { background: #E8F5E9; border-left-color: #1D6B37; }
.chk { position: absolute; left: 12px; top: 12px; width: 22px; height: 22px; border: 2px solid #d8e4f0; border-radius: 6px; background: #f0f4f8; text-align: center; line-height: 18px; font-size: 13px; color: transparent; }
.item.done .chk { background: #1D6B37; border-color: #1D6B37; color: #fff; }
.itxt { font-size: 13px; font-weight: bold; line-height: 1.3; }
.item.done .itxt { color: #1D6B37; text-decoration: line-through; }
.isub { font-size: 11px; color: #6b7280; margin-top: 2px; }
.tagc { display: inline-block; background: #FAEEDA; border: 1px solid #BA7517; color: #BA7517; font-size: 9px; font-weight: bold; padding: 1px 5px; border-radius: 4px; margin-top: 3px; }
.item.done .tagc { background: #E8F5E9; border-color: #1D6B37; color: #1D6B37; }
.tagt { font-size: 11px; color: #6b7280; margin-left: 5px; }
.spacer { height: 90px; }
.savebar { position: fixed; bottom: 0; left: 0; right: 0; background: #fff; border-top: 1px solid #d8e4f0; padding: 10px 16px 24px; display: flex; gap: 8px; }
.savebar .btn-hist { background: #f0f4f8; border: 1px solid #d8e4f0; border-radius: 8px; padding: 12px 14px; font-size: 14px; font-weight: bold; cursor: pointer; font-family: inherit; color: #1a1a2e; }
.savebar .btn-save { flex: 1; background: #0C447C; color: #fff; border: none; border-radius: 8px; padding: 12px; font-size: 14px; font-weight: bold; font-family: inherit; cursor: pointer; }
.ovlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 100; display: none; }
.ovlay.show { display: block; }
.mdl { position: absolute; bottom: 0; left: 0; right: 0; background: #fff; border-radius: 18px 18px 0 0; padding: 20px 20px 40px; max-height: 85vh; overflow-y: auto; }
.mdl-hdl { width: 36px; height: 4px; background: #d8e4f0; border-radius: 2px; margin: 0 auto 14px; }
.mdl-t { font-size: 16px; font-weight: bold; margin-bottom: 8px; }
.mdl-t.red { color: #8B2020; }
.mdl-t.blue { color: #0C447C; }
.mdl-b { font-size: 13px; color: #6b7280; line-height: 1.5; margin-bottom: 16px; }
.mbtn { display: block; width: 100%; padding: 13px; border-radius: 10px; border: none; font-size: 14px; font-weight: bold; font-family: inherit; cursor: pointer; margin-bottom: 10px; text-align: center; }
.mbtn.red { background: #8B2020; color: #fff; }
.mbtn.grey { background: #f0f4f8; color: #1a1a2e; border: 1px solid #d8e4f0; }
#toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); background: #1a1a2e; color: #fff; border-radius: 20px; padding: 7px 16px; font-size: 13px; font-weight: bold; z-index: 300; white-space: nowrap; display: none; pointer-events: none; }
#errmsg { background: #FDECEC; border: 2px solid #8B2020; border-radius: 10px; margin: 12px 16px; padding: 12px; font-size: 12px; color: #8B2020; display: none; word-break: break-all; white-space: pre-wrap; }
</style>
</head>
<body>

<div id="errmsg"></div>

<div class="hdr">
  <h1>Check-list de vol</h1>
  <p>CONTE Philippe - FRAjqq48j12nfy4c - DJI Mavic 4 Pro</p>
  <div class="mrow">
    <label>Mission :</label>
    <input id="missionId" placeholder="Ex: M2025-001" maxlength="30">
    <button onclick="showHist()">Missions</button>
  </div>
</div>

<div class="segbar">
  <div class="seg">
    <button id="btnPre" class="on" onclick="sw('pre')">Pre-vol (<span id="cntPre">0/0</span>)</button>
    <button id="btnPost" onclick="sw('post')">Post-vol (<span id="cntPost">0/0</span>)</button>
  </div>
</div>

<div class="progbar">
  <div class="progtop">
    <span>Progression</span>
    <strong id="pct">0%</strong>
  </div>
  <div class="progtrack"><div class="progfill" id="pFill"></div></div>
  <div class="progstats">
    <b id="nOk">0</b> coches &nbsp; <b id="nCrit">0</b> critiques restants &nbsp; <b id="nTot">0</b> total
  </div>
</div>

<div class="actbar">
  <button class="btn-ok" onclick="checkAll()">Tout cocher</button>
  <button class="btn-ko" onclick="openOv('ovReset')">Reset</button>
  <button class="btn-am" onclick="showGo()">GO / NO-GO</button>
</div>

<div class="banner" id="banner">
  <div class="btitle" id="bTitle"></div>
  <div class="bdesc" id="bDesc"></div>
  <button class="btn-ov" id="btnOv" onclick="openOv('ovOv')">Passer outre</button>
</div>

<div id="listContent"></div>
<div class="spacer"></div>

<div class="savebar">
  <button class="btn-hist" onclick="showHist()">Hist.</button>
  <button class="btn-save" onclick="saveMission()">Enregistrer la mission</button>
</div>

<div class="ovlay" id="ovOv">
  <div class="mdl">
    <div class="mdl-hdl"></div>
    <div class="mdl-t red">Items critiques non valides</div>
    <div class="mdl-b" id="ovOvB"></div>
    <button class="mbtn red" onclick="doOv()">Autoriser le decollage quand meme</button>
    <button class="mbtn grey" onclick="closeOv('ovOv')">Retour</button>
  </div>
</div>

<div class="ovlay" id="ovReset">
  <div class="mdl">
    <div class="mdl-hdl"></div>
    <div class="mdl-t red">Reinitialiser ?</div>
    <div class="mdl-b">Tous les items seront decoches.</div>
    <button class="mbtn red" onclick="doReset()">Reinitialiser</button>
    <button class="mbtn grey" onclick="closeOv('ovReset')">Annuler</button>
  </div>
</div>

<div class="ovlay" id="ovHist">
  <div class="mdl">
    <div class="mdl-hdl"></div>
    <div class="mdl-t blue">Missions sauvegardees</div>
    <div id="histList" style="max-height:45vh;overflow-y:auto;margin-bottom:12px;"></div>
    <button class="mbtn grey" onclick="closeOv('ovHist')">Fermer</button>
  </div>
</div>

<div id="toast"></div>

<script>
window.onerror = function(msg, src, line, col, err) {
  var d = document.getElementById('errmsg');
  d.style.display = 'block';
  d.textContent = 'ERREUR JS: ' + msg + ' | Ligne: ' + line + (err && err.stack ? '\n' + err.stack : '');
  return false;
};

var phase = 'pre';
var mission = '';
var ovOk = false;
var mem = {};

function sGet(k) {
  try { var v = localStorage.getItem(k); return v ? JSON.parse(v) : {}; } catch(e) { return mem[k] || {}; }
}
function sPut(k, v) {
  try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) { mem[k] = v; }
}

var PRE = [
  { s:'Batteries', items:[
    {id:'p01',t:'Batterie drone sup 80%',sub:'DJI Fly',c:true},
    {id:'p02',t:'Batterie telecommande sup 60%',sub:'RC-N2 ou RC 2',c:true},
    {id:'p03',t:'Telephone charge',sub:'Si ecran',c:false}
  ]},
  { s:'Documents', items:[
    {id:'p04',t:'Numero de mission',sub:'Tracabilite',c:true},
    {id:'p05',t:'NOTAM consultes zone libre',sub:'Sofia / SIA',c:true},
    {id:'p06',t:'Meteo verifiee',sub:'Vent visibilite pluie',c:true},
    {id:'p07',t:'Autorisation prefectorale valide',sub:'S02: notif 10j ouvres',c:true},
    {id:'p08',t:'Assurance COVERDRONE active',sub:'CDA22411846EUR exp 10/04/2027',c:false},
    {id:'p09',t:'CATS valide',sub:'NLD-RP-q99cvjjh51fz exp 15/09/2029',c:false}
  ]},
  { s:'Inspection drone', items:[
    {id:'p10',t:'Bras deplies verrouilles x4',sub:'Mavic 4 Pro',c:true},
    {id:'p11',t:'Helices fixees sans dommage',sub:'Controle visuel',c:true},
    {id:'p12',t:'Cardan libre protege retire',sub:'Camera axe correct',c:true},
    {id:'p13',t:'Capteurs propres',sub:'Avant arriere bas',c:false},
    {id:'p14',t:'Marquage UAS-FR-517804 visible',sub:'Obligation reglementaire',c:true},
    {id:'p15',t:'Module DRI actif',sub:'FRAjqq48j12nfy4cvsy',c:true}
  ]},
  { s:'Liaison et GPS', items:[
    {id:'p16',t:'Telecommande allumee AVANT drone',sub:'Procedure DJI',c:true},
    {id:'p17',t:'Liaison RC etablie signal vert',sub:'O4 Pro min 4 barres',c:true},
    {id:'p18',t:'GPS min 8 satellites',sub:'Attendre fixe stable',c:true},
    {id:'p19',t:'Hauteur max configuree',sub:'S01:120m S02:voir auth',c:true},
    {id:'p20',t:'Point RTH defini',sub:'Position decollage',c:true}
  ]},
  { s:'Zone et Securite', items:[
    {id:'p21',t:'Zone degagee et securisee',sub:'Perimetre etabli',c:true},
    {id:'p22',t:'Observateurs en place PDRA-S02',sub:'OBS1 OBS2 radio OK',c:false},
    {id:'p23',t:'Decision GO prononcee',sub:'CDB: CONTE Philippe',c:true}
  ]}
];

var POST = [
  { s:'Atterrissage', items:[
    {id:'q01',t:'Drone immobile moteurs arretes',sub:'Avant manipulation',c:true},
    {id:'q02',t:'Drone eteint AVANT telecommande',sub:'Ordre extinction',c:true},
    {id:'q03',t:'Heure atterrissage notee',sub:'Duree de vol',c:false}
  ]},
  { s:'Batteries post-vol', items:[
    {id:'q04',t:'Niveau batterie releve',sub:'Carnet de vol',c:false},
    {id:'q05',t:'Temperature inf 45C avant charge',sub:'Laisser refroidir',c:true}
  ]},
  { s:'Inspection post-vol', items:[
    {id:'q06',t:'Helices sans dommage',sub:'Fissures eclats',c:true},
    {id:'q07',t:'Bras replies correctement',sub:'Position transport',c:false},
    {id:'q08',t:'Protege-cardan remis',sub:'Protection transport',c:false},
    {id:'q09',t:'Incident ou anomalie ?',sub:'Si oui ouvrir REX',c:true}
  ]},
  { s:'Tracabilite', items:[
    {id:'q10',t:'Carnet de vol mis a jour',sub:'Duree lieu scenario',c:true},
    {id:'q11',t:'Medias transferes',sub:'Photos videos',c:false},
    {id:'q12',t:'Materiel range inventorie',sub:'Valise helices cables',c:false}
  ]}
];

var DATA = {pre:PRE, post:POST};

function stKey() { return 'uas_cl_' + (mission || '_tmp'); }
function getS() { return sGet(stKey()); }
function putS(s) { sPut(stKey(), s); }
function p2(n) { return n < 10 ? '0' + n : String(n); }

function render() {
  var s = getS();
  var list = DATA[phase];
  var html = '';
  var i, j, sec, item, done, t;
  for (i = 0; i < list.length; i++) {
    sec = list[i];
    html += '<div class="seclbl">' + sec.s + '</div>';
    for (j = 0; j < sec.items.length; j++) {
      item = sec.items[j];
      done = s[item.id] ? true : false;
      t = s[item.id + '_t'] || '';
      html += '<div class="item' + (item.c ? ' crit' : '') + (done ? ' done' : '') + '" onclick="tog(\'' + item.id + '\')">';
      html += '<div class="chk">' + (done ? 'v' : '') + '</div>';
      html += '<div class="itxt">' + item.t + '</div>';
      html += '<div class="isub">' + item.sub + '</div>';
      if (item.c) { html += '<span class="tagc">CRITIQUE</span>'; }
      if (t) { html += '<span class="tagt">ok ' + t + '</span>'; }
      html += '</div>';
    }
  }
  document.getElementById('listContent').innerHTML = html;
  updateStats();
}

function tog(id) {
  var s = getS();
  var n = new Date();
  if (s[id]) { delete s[id]; delete s[id + '_t']; }
  else { s[id] = 1; s[id + '_t'] = p2(n.getHours()) + ':' + p2(n.getMinutes()); }
  putS(s); render();
  document.getElementById('banner').style.display = 'none';
}

function updateStats() {
  var s = getS();
  var list = DATA[phase];
  var tot = 0, chk = 0, crit = 0;
  var i, j, item;
  for (i = 0; i < list.length; i++) {
    for (j = 0; j < list[i].items.length; j++) {
      item = list[i].items[j]; tot++;
      if (s[item.id]) { chk++; } else if (item.c) { crit++; }
    }
  }
  var p = tot ? Math.round(chk / tot * 100) : 0;
  document.getElementById('pct').textContent = p + '%';
  var f = document.getElementById('pFill');
  f.style.width = p + '%';
  f.style.background = p === 100 ? '#1D6B37' : (p > 60 ? '#185FA5' : '#BA7517');
  document.getElementById('nOk').textContent = chk;
  document.getElementById('nCrit').textContent = crit;
  document.getElementById('nTot').textContent = tot;
  var ph, t2, c2;
  for (ph in DATA) {
    t2 = 0; c2 = 0;
    for (i = 0; i < DATA[ph].length; i++) {
      for (j = 0; j < DATA[ph][i].items.length; j++) {
        t2++; if (s[DATA[ph][i].items[j].id]) { c2++; }
      }
    }
    document.getElementById(ph === 'pre' ? 'cntPre' : 'cntPost').textContent = c2 + '/' + t2;
  }
}

function sw(p) {
  phase = p;
  document.getElementById('btnPre').className = p === 'pre' ? 'on' : '';
  document.getElementById('btnPost').className = p === 'post' ? 'on' : '';
  document.getElementById('banner').style.display = 'none';
  render(); window.scrollTo(0, 0);
}

function checkAll() {
  var s = getS(); var n = new Date();
  var t = p2(n.getHours()) + ':' + p2(n.getMinutes());
  var list = DATA[phase]; var i, j, id;
  for (i = 0; i < list.length; i++) {
    for (j = 0; j < list[i].items.length; j++) {
      id = list[i].items[j].id;
      if (!s[id]) { s[id] = 1; s[id + '_t'] = t; }
    }
  }
  putS(s); render(); toast('Tous les items coches');
}

function doReset() {
  var s = getS(); var list = DATA[phase]; var i, j, id;
  for (i = 0; i < list.length; i++) {
    for (j = 0; j < list[i].items.length; j++) {
      id = list[i].items[j].id; delete s[id]; delete s[id + '_t'];
    }
  }
  ovOk = false; putS(s); closeOv('ovReset'); render(); toast('Reinitialise');
}

function showGo() {
  if (phase !== 'pre') { toast('GO/NO-GO en pre-vol seulement'); return; }
  var s = getS(); var missing = []; var list = DATA.pre; var i, j, item;
  for (i = 0; i < list.length; i++) {
    for (j = 0; j < list[i].items.length; j++) {
      item = list[i].items[j];
      if (item.c && !s[item.id]) { missing.push(item.t); }
    }
  }
  var b = document.getElementById('banner');
  b.style.display = 'block';
  if (missing.length === 0 || ovOk) {
    b.className = 'banner go';
    document.getElementById('bTitle').textContent = (ovOk && missing.length) ? 'GO avec derogation' : 'GO - Decollage autorise';
    document.getElementById('bDesc').textContent = (ovOk && missing.length) ? (missing.length + ' item(s) non valide(s)') : 'Tous les items critiques sont valides.';
    document.getElementById('btnOv').style.display = 'none';
  } else {
    b.className = 'banner nogo';
    document.getElementById('bTitle').textContent = 'NO-GO - Decollage interdit';
    document.getElementById('bDesc').textContent = missing.length + ' item(s) critique(s) non valide(s)';
    document.getElementById('btnOv').style.display = 'block';
  }
}

function doOv() { ovOk = true; closeOv('ovOv'); showGo(); toast('Derogation enregistree'); }

function saveMission() {
  var id = document.getElementById('missionId').value;
  id = id ? id.trim() : '';
  if (!id) { toast('Saisir un numero de mission'); return; }
  mission = id;
  var ml = sGet('uas_cl_missions');
  ml[id] = {id:id, date:new Date().toISOString(), ov:ovOk};
  sPut('uas_cl_missions', ml); putS(getS()); toast('Mission ' + id + ' sauvegardee');
}

function showHist() {
  var ml = sGet('uas_cl_missions'); var keys = Object.keys(ml).sort().reverse();
  var html = ''; var i, k, m, d;
  if (!keys.length) {
    html = '<p style="text-align:center;padding:20px;color:#6b7280;">Aucune mission</p>';
  } else {
    for (i = 0; i < keys.length; i++) {
      k = keys[i]; m = ml[k]; d = new Date(m.date).toLocaleDateString('fr-FR');
      html += '<div style="padding:11px 0;border-bottom:1px solid #d8e4f0;cursor:pointer;display:flex;align-items:center;gap:10px;" onclick="loadMission(\'' + k + '\')">';
      html += '<div style="flex:1;"><div style="font-weight:bold;">' + k + '</div><div style="font-size:11px;color:#6b7280;">' + d + '</div></div>';
      html += '<span style="color:#185FA5;">-></span></div>';
    }
  }
  document.getElementById('histList').innerHTML = html; openOv('ovHist');
}

function loadMission(id) {
  mission = id; document.getElementById('missionId').value = id;
  var ml = sGet('uas_cl_missions'); ovOk = ml[id] ? !!ml[id].ov : false;
  closeOv('ovHist'); render(); toast('Mission ' + id + ' chargee');
}

document.getElementById('missionId').addEventListener('input', function() {
  mission = this.value ? this.value.trim() : ''; ovOk = false;
});

function openOv(id) { document.getElementById(id).className = 'ovlay show'; }
function closeOv(id) { document.getElementById(id).className = 'ovlay'; }
function toast(msg) {
  var t = document.getElementById('toast'); t.textContent = msg; t.style.display = 'block';
  setTimeout(function() { t.style.display = 'none'; }, 2500);
}

render();
</script>
</body>
</html>
