<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>UAS Manager — Activation</title>
<style>
:root{--navy:#0C447C;--blue:#185FA5;--green:#1D6B37;--amber:#BA7517;--red:#8B2020;--purple:#5C35A0;--bg:#F0F4FA;--surface:#fff;--text:#0D1220;--muted:#5A6478;--border:#D0DCF0;}
@media(prefers-color-scheme:dark){:root{--bg:#0D1220;--surface:#161E30;--text:#E8EEF8;--muted:#7A8BAA;--border:#253050;}}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;min-height:-webkit-fill-available;font-family:-apple-system,sans-serif;background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;padding:24px 16px;}
.wrap{width:100%;max-width:340px;}
/* LOGO */
.logo{text-align:center;margin-bottom:28px;}
.logo span{font-size:64px;display:block;margin-bottom:12px;}
.logo h1{font-size:24px;font-weight:900;color:var(--navy);letter-spacing:-.5px;}
@media(prefers-color-scheme:dark){.logo h1{color:#7EB8F7;}}
.logo p{font-size:11px;color:var(--muted);margin-top:5px;}
/* CARD */
.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:22px 18px;box-shadow:0 4px 20px rgba(12,68,124,.1);}
/* INPUT */
.lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;display:block;}
.inp{width:100%;background:var(--bg);border:2px solid var(--border);border-radius:11px;color:var(--text);font-size:17px;font-weight:800;padding:14px 12px;font-family:'SF Mono','Courier New',monospace;letter-spacing:3px;text-transform:uppercase;text-align:center;transition:border-color .15s;}
.inp:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.1);}
.inp::placeholder{font-family:-apple-system,sans-serif;letter-spacing:0;font-size:14px;font-weight:400;text-transform:none;color:var(--muted);}
/* BOUTON */
.btn-go{width:100%;margin-top:14px;background:linear-gradient(135deg,#0C447C,#185FA5);color:#fff;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;transition:opacity .15s;}
.btn-go:active{opacity:.82;}
/* GRATUIT */
.btn-free{width:100%;margin-top:8px;background:none;border:1.5px solid var(--border);border-radius:12px;padding:12px;font-size:13px;font-weight:600;cursor:pointer;color:var(--muted);font-family:inherit;}
/* MESSAGE */
.msg{display:none;margin-top:12px;padding:12px;border-radius:10px;font-size:13px;font-weight:600;text-align:center;}
.ok{background:#E8F5E9;color:#1D6B37;display:block;}
.err{background:#FDECEC;color:#8B2020;display:block;}
/* SUCCÈS */
.success{display:none;text-align:center;padding:10px 0;}
.s-icon{font-size:56px;margin-bottom:12px;}
.s-title{font-size:20px;font-weight:900;color:var(--green);margin-bottom:8px;}
.s-badge{display:inline-block;padding:5px 16px;border-radius:20px;font-size:13px;font-weight:700;margin-bottom:14px;}
.s-sub{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5;}
.btn-open{width:100%;background:var(--green);color:#fff;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;}
/* FOOTER */
.footer{text-align:center;margin-top:16px;font-size:10px;color:var(--muted);line-height:1.8;}
.spin{display:inline-block;animation:rot .7s linear infinite;}
@keyframes rot{to{transform:rotate(360deg);}}
</style>
</head>
<body>
<div class="wrap">

  <div class="logo">
    <span>🛸</span>
    <h1>UAS Manager</h1>
    <p>© 2026 Philippe CONTE · Tous droits réservés</p>
  </div>

  <!-- FORMULAIRE -->
  <div class="card" id="form-card">
    <label class="lbl">Clé de licence</label>
    <input class="inp" id="key" type="text"
      placeholder="Ex: STD-XXXX-XXXX"
      autocomplete="off" autocorrect="off"
      autocapitalize="characters" spellcheck="false"
      maxlength="14">
    <button class="btn-go" id="btn" onclick="activate()">🔓 Activer</button>
    <button class="btn-free" onclick="goFree()">Continuer gratuitement →</button>
    <div class="msg" id="msg"></div>
  </div>

  <!-- SUCCÈS -->
  <div class="card success" id="ok-card">
    <div class="s-icon">✅</div>
    <div class="s-title">Activé !</div>
    <div class="s-badge" id="ok-badge"></div>
    <div class="s-sub" id="ok-sub"></div>
    <button class="btn-open" onclick="location.href='index.html'">🚀 Ouvrir l'application</button>
    <div style="margin-top:12px;">
      <button onclick="reset()" style="background:none;border:none;color:var(--muted);font-size:11px;cursor:pointer;text-decoration:underline;font-family:inherit;">Changer de licence</button>
    </div>
  </div>

  <div class="footer">
    UAS-XXXX-XXXX &nbsp;·&nbsp; STD-XXXX-XXXX &nbsp;·&nbsp; PRO-XXXX-XXXX &nbsp;·&nbsp; VIP-XXXX-XXXX<br>
    Contact : contephil74@gmail.com
  </div>

</div>
<script>
// UAS Manager — Activation © 2026 Philippe CONTE
// Les hashes SHA-256 des clés valides (jamais les clés en clair)
var V = {
  // ── CRÉATEUR (Philippe CONTE) ──
  '3640b2f1ba5c9d5afd4c238ad403e6c71aa37df3d5936f01a1ffdd4ae582071e':{plan:'personal',label:'👤 Créateur',bg:'#E6F1FB',color:'#185FA5',expires:null},
  '691fc5c6b8f02ee694e082d4ce9ca679f3da82aedfa4b5b1280948a1fecc04df':{plan:'personal',label:'👤 Créateur',bg:'#E6F1FB',color:'#185FA5',expires:null},
  'ca2a5ef74a9f6f8911a5913612841bb1a8087eb7f5978bb0b81ca803ac73da42':{plan:'personal',label:'👤 Créateur',bg:'#E6F1FB',color:'#185FA5',expires:null},
  // ── STANDARD ──
  '8d9f21806a142c95bc2178fb24ef1303c61d2d90db86f70a03b6a872bd187564':{plan:'standard',label:'⭐ Standard',bg:'#FAEEDA',color:'#BA7517',expires:'2027-12-31'},
  // ── PRO ──
  '39a70680bb1b674520eb751640eace8d389c16bb5923ab4c8d59b97e9f624a6f':{plan:'pro',label:'🏆 Pro',bg:'#E8F5E9',color:'#1D6B37',expires:'2027-12-31'},
  // ── VIP ──
  '93c6145368a6f7a6c06a710efa55969bbd784d3aa282ba0524d00afe7850d8e5':{plan:'vip',label:'💎 VIP',bg:'#EDE7F6',color:'#5C35A0',expires:'2027-12-31'}
};

var LK = 'uas_license';

async function sha256(s){
  var b = await crypto.subtle.digest('SHA-256',new TextEncoder().encode(s.toUpperCase()));
  return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0');}).join('');
}

async function activate(){
  var key = document.getElementById('key').value.trim();
  if(!key){ show('⚠️ Entrez votre clé','warn'); return; }
  var btn = document.getElementById('btn');
  btn.innerHTML = '<span class="spin">⏳</span>';
  btn.disabled = true;
  var hash = await sha256(key);
  var lic = V[hash];
  if(!lic){
    show('❌ Clé invalide','err');
    btn.innerHTML = '🔓 Activer'; btn.disabled = false;
    return;
  }
  if(lic.expires && new Date(lic.expires) < new Date()){
    show('⏰ Clé expirée','err');
    btn.innerHTML = '🔓 Activer'; btn.disabled = false;
    return;
  }
  localStorage.setItem(LK, JSON.stringify({hash:hash,plan:lic.plan,label:lic.label,expires:lic.expires,at:new Date().toISOString()}));
  showOk(lic);
}

function showOk(lic){
  document.getElementById('form-card').style.display = 'none';
  var c = document.getElementById('ok-card');
  c.style.display = 'block';
  var b = document.getElementById('ok-badge');
  b.textContent = lic.label;
  b.style.background = lic.bg;
  b.style.color = lic.color;
  document.getElementById('ok-sub').textContent = lic.plan === 'personal'
    ? 'Bienvenue Philippe. Accès complet sans restriction.'
    : 'Accès ' + lic.label + ' activé.' + (lic.expires ? ' Valide jusqu\'au ' + new Date(lic.expires).toLocaleDateString('fr-FR') + '.' : '');
}

function goFree(){ localStorage.removeItem(LK); location.href='index.html'; }
function reset(){ localStorage.removeItem(LK); location.reload(); }

function show(msg,type){
  var el=document.getElementById('msg');
  el.textContent=msg;
  el.className='msg '+(type==='err'?'err':'ok');
  setTimeout(function(){el.className='msg';},4000);
}

// Formater automatiquement la clé pendant la saisie
document.getElementById('key').addEventListener('input',function(){
  var v = this.value.toUpperCase().replace(/[^A-Z0-9]/g,'');
  // Format : XXX-XXXX-XXXX
  var out = '';
  for(var i=0;i<v.length;i++){
    if(i===3||i===7) out+='-';
    out+=v[i];
  }
  this.value = out.slice(0,14);
});

document.getElementById('key').addEventListener('keydown',function(e){
  if(e.key==='Enter') activate();
});

// Vérifier si déjà activé
(function(){
  var r = localStorage.getItem(LK);
  if(!r) return;
  try{
    var l = JSON.parse(r);
    if(!l.hash||!V[l.hash]) return;
    if(l.expires && new Date(l.expires)<new Date()) return;
    showOk(V[l.hash]);
  }catch(e){}
})();
</script>
</body>
</html>
