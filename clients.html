<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>UAS Manager — Clients & Missions</title>
<style>
:root{
  --navy:#0C447C;--blue:#185FA5;--light-blue:#E6F1FB;
  --green:#1D6B37;--light-green:#E8F5E9;
  --amber:#BA7517;--light-amber:#FAEEDA;
  --red:#8B2020;--light-red:#FDECEC;
  --purple:#5C35A0;--light-purple:#EDE7F6;
  --teal:#006064;
  --bg:#F0F4FA;--surface:#fff;--surface2:#F8FAFD;
  --text:#0D1220;--text-muted:#5A6478;--border:#D0DCF0;
  --shadow:0 2px 14px rgba(12,68,124,0.09);
  --radius:14px;--header-h:56px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#0D1220;--surface:#161E30;--surface2:#1C2840;--text:#E8EEF8;--text-muted:#7A8BAA;--border:#253050;--light-blue:#1A2D4A;--light-amber:#2A1E00;--light-green:#0F2318;--light-red:#2A0D0D;--light-purple:#1E1535;}
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;font-family:-apple-system,'SF Pro Text',BlinkMacSystemFont,system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}

/* ─── HEADER ─── */
#header{background:var(--navy);display:flex;align-items:center;justify-content:space-between;padding:env(safe-area-inset-top) 14px 0;height:calc(var(--header-h) + env(safe-area-inset-top));position:sticky;top:0;z-index:300;box-shadow:0 2px 12px rgba(12,68,124,.25);overflow:hidden;}
#header::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 85%,rgba(24,95,165,.4),transparent 60%);pointer-events:none;}
#header h1{font-size:17px;font-weight:800;color:#fff;display:flex;align-items:center;gap:7px;position:relative;z-index:1;}
.back-btn{background:rgba(255,255,255,.14);border:none;border-radius:8px;color:#fff;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;position:relative;z-index:1;display:flex;align-items:center;gap:4px;transition:background .15s;}
.back-btn:active{background:rgba(255,255,255,.28);}
#header-right{display:flex;gap:7px;align-items:center;position:relative;z-index:1;}
.hdr-btn{background:rgba(255,255,255,.14);border:none;border-radius:8px;color:#fff;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:background .15s;}
.hdr-btn:active{background:rgba(255,255,255,.28);}

/* ─── TABS ─── */
#tabs{background:var(--surface);border-bottom:1px solid var(--border);display:flex;position:sticky;top:calc(var(--header-h) + env(safe-area-inset-top));z-index:200;}
.tab-btn{flex:1;background:none;border:none;border-bottom:2.5px solid transparent;color:var(--text-muted);font-size:12px;font-weight:600;padding:11px 6px;cursor:pointer;transition:all .15s;font-family:inherit;}
.tab-btn.active{color:var(--navy);border-bottom-color:var(--navy);}
@media(prefers-color-scheme:dark){.tab-btn.active{color:#7EB8F7;border-bottom-color:#7EB8F7;}}

/* ─── CONTENT ─── */
#content{max-width:660px;margin:0 auto;padding:14px 12px calc(90px + env(safe-area-inset-bottom));}
.tab-section{display:none;} .tab-section.active{display:block;}

/* ─── KPI BAR ─── */
.kpi-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px;}
.kpi-tile{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 10px;text-align:center;box-shadow:var(--shadow);}
.kpi-tile .kv{font-size:22px;font-weight:800;color:var(--navy);line-height:1;}
@media(prefers-color-scheme:dark){.kpi-tile .kv{color:#7EB8F7;}}
.kpi-tile .kl{font-size:10px;font-weight:600;color:var(--text-muted);margin-top:3px;}

/* ─── SEARCH ─── */
.search-bar{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:9px 13px;display:flex;align-items:center;gap:8px;margin-bottom:12px;box-shadow:var(--shadow);}
.search-bar input{flex:1;background:none;border:none;font-size:13px;color:var(--text);font-family:inherit;}
.search-bar input:focus{outline:none;}
.search-bar input::placeholder{color:var(--text-muted);}

/* ─── CLIENT CARD ─── */
.client-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);animation:fadeUp .3s both;cursor:pointer;transition:transform .12s;}
.client-card:active{transform:scale(.98);}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.client-card-top{display:flex;align-items:center;gap:12px;padding:13px 14px;}
.client-avatar{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;font-weight:800;}
.client-info{flex:1;min-width:0;}
.client-name{font-size:14px;font-weight:700;color:var(--text);}
.client-type{font-size:11px;color:var(--text-muted);margin-top:2px;}
.client-stats{display:flex;gap:12px;margin-top:5px;}
.client-stat{font-size:11px;font-weight:600;color:var(--text-muted);}
.client-stat span{color:var(--navy);font-weight:700;}
@media(prefers-color-scheme:dark){.client-stat span{color:#7EB8F7;}}
.client-actions{display:flex;border-top:1px solid var(--border);background:var(--surface2);}
.client-action{flex:1;background:none;border:none;border-right:1px solid var(--border);padding:9px 6px;font-size:11px;font-weight:600;cursor:pointer;color:var(--text-muted);font-family:inherit;transition:background .12s;text-align:center;}
.client-action:last-child{border-right:none;}
.client-action:active{background:var(--light-blue);}
.client-action.primary{color:var(--blue);}
.client-action.danger{color:var(--red);}

/* ─── DEVIS CARD ─── */
.devis-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;box-shadow:var(--shadow);animation:fadeUp .3s both;}
.devis-top{display:flex;align-items:center;gap:12px;padding:12px 14px;}
.devis-num{width:44px;height:44px;border-radius:10px;background:var(--light-blue);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--navy);flex-shrink:0;text-align:center;line-height:1.2;}
.devis-info{flex:1;}
.devis-title{font-size:14px;font-weight:700;color:var(--text);}
.devis-meta{font-size:11px;color:var(--text-muted);margin-top:2px;}
.devis-amount{font-size:18px;font-weight:800;color:var(--green);flex-shrink:0;}
.devis-footer{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-top:1px solid var(--border);background:var(--surface2);}
.devis-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:8px;}
.devis-actions{display:flex;gap:7px;}
.devis-btn{background:var(--light-blue);border:none;border-radius:7px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;color:var(--navy);font-family:inherit;}
.devis-btn.green{background:var(--light-green);color:var(--green);}
.devis-btn.red{background:var(--light-red);color:var(--red);}

/* ─── FORM ─── */
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:9px;}
.field-row.full{grid-template-columns:1fr;}
.field-row.tri{grid-template-columns:1fr 1fr 1fr;}
.field{display:flex;flex-direction:column;gap:4px;}
.field label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;}
.field input,.field select,.field textarea{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;font-weight:500;padding:8px 10px;width:100%;font-family:inherit;transition:border-color .15s;}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--blue);}
.field textarea{resize:vertical;min-height:64px;}

/* ─── MODAL ─── */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:500;display:none;align-items:flex-end;justify-content:center;}
#modal-overlay.open{display:flex;}
#modal-box{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:640px;max-height:90vh;overflow-y:auto;animation:slideUp .28s cubic-bezier(.34,1.2,.64,1);}
@keyframes slideUp{from{transform:translateY(60px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
.modal-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:16px;font-weight:800;color:var(--navy);}
@media(prefers-color-scheme:dark){.modal-title{color:#7EB8F7;}}
.modal-close{background:var(--light-blue);border:none;border-radius:50%;width:28px;height:28px;font-size:13px;cursor:pointer;color:var(--text-muted);font-weight:700;display:flex;align-items:center;justify-content:center;}
.modal-body{padding:14px 16px;}
.modal-footer{padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom));border-top:1px solid var(--border);display:flex;gap:9px;background:var(--surface2);}

/* ─── LIGNE DEVIS ─── */
.ligne-devis{display:grid;grid-template-columns:1fr 70px 80px 30px;gap:8px;align-items:center;margin-bottom:7px;}
.ligne-devis input{background:var(--bg);border:1.5px solid var(--border);border-radius:7px;color:var(--text);font-size:12px;padding:7px 8px;font-family:inherit;}
.ligne-del{background:var(--light-red);border:none;border-radius:7px;color:var(--red);font-size:14px;cursor:pointer;height:34px;display:flex;align-items:center;justify-content:center;}
.total-line{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--light-blue);border-radius:8px;margin-top:8px;}
.total-label{font-size:13px;font-weight:700;color:var(--navy);}
.total-val{font-size:20px;font-weight:800;color:var(--navy);}
@media(prefers-color-scheme:dark){.total-label,.total-val{color:#7EB8F7;}}

/* ─── BUTTONS ─── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:none;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;padding:11px 16px;transition:opacity .15s,transform .1s;font-family:inherit;white-space:nowrap;}
.btn:active{opacity:.8;transform:scale(.97);}
.btn-primary{background:var(--blue);color:#fff;}
.btn-green{background:var(--green);color:#fff;}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text);}
.btn-full{width:100%;}
.btn-sm{padding:7px 12px;font-size:12px;border-radius:8px;}

/* ─── FAB ─── */
#fab{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom));right:18px;width:56px;height:56px;border-radius:50%;background:var(--blue);color:#fff;border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 20px rgba(24,95,165,.45);display:flex;align-items:center;justify-content:center;z-index:400;transition:transform .15s;}
#fab:active{transform:scale(.92);}

/* ─── SECTION TITLE ─── */
.sec-title{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;margin:14px 0 8px;display:flex;align-items:center;justify-content:space-between;}

/* ─── TOAST ─── */
#toast{position:fixed;top:calc(var(--header-h) + env(safe-area-inset-top) + 10px);left:50%;transform:translateX(-50%) translateY(-60px);background:var(--green);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;font-weight:700;z-index:600;white-space:nowrap;transition:transform .28s cubic-bezier(.34,1.2,.64,1);box-shadow:0 4px 16px rgba(0,0,0,.2);pointer-events:none;}
#toast.visible{transform:translateX(-50%) translateY(0);}
#toast.amber{background:var(--amber);}
#toast.red{background:var(--red);}

/* ─── EMPTY ─── */
.empty{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:13px;}
.empty-icon{font-size:40px;margin-bottom:10px;}
</style>
</head>
<body>

<header id="header">
  <h1>💼 Clients & Missions</h1>
  <div id="header-right">
    <button class="hdr-btn" id="fab-hdr" onclick="openNewModal()">+ Nouveau</button>
    <a class="back-btn" href="index.html">← Accueil</a>
  </div>
</header>

<div id="tabs">
  <button class="tab-btn active" onclick="switchTab('clients')">👤 Clients</button>
  <button class="tab-btn" onclick="switchTab('devis')">📄 Devis</button>
  <button class="tab-btn" onclick="switchTab('factures')">💶 Factures</button>
  <button class="tab-btn" onclick="switchTab('stats')">📊 Bilan CA</button>
</div>

<div id="content">

  <!-- ── CLIENTS ── -->
  <div class="tab-section active" id="tab-clients">
    <div class="kpi-bar" id="kpi-clients"></div>
    <div class="search-bar">
      <span>🔍</span>
      <input type="text" id="search-clients" placeholder="Rechercher un client…" oninput="filterClients()">
    </div>
    <div id="clients-list"></div>
  </div>

  <!-- ── DEVIS ── -->
  <div class="tab-section" id="tab-devis">
    <div class="kpi-bar" id="kpi-devis"></div>
    <div id="devis-list"></div>
  </div>

  <!-- ── FACTURES ── -->
  <div class="tab-section" id="tab-factures">
    <div class="kpi-bar" id="kpi-factures"></div>
    <div id="factures-list"></div>
  </div>

  <!-- ── BILAN CA ── -->
  <div class="tab-section" id="tab-stats">
    <div class="sec-title">Chiffre d'affaires</div>
    <div id="ca-stats"></div>
    <div class="sec-title" style="margin-top:18px;">Top clients</div>
    <div id="top-clients"></div>
  </div>

</div>

<button id="fab" onclick="openNewModal()">+</button>

<!-- MODAL CLIENT -->
<div id="modal-overlay">
  <div id="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <div class="modal-title" id="modal-title">Nouveau client</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
//  UAS Manager — Clients & Missions
//  © Philippe CONTE · FRAjqq48j12nfy4c
// ═══════════════════════════════════════════════════════════

const CLIENTS_KEY = 'uas_clients';
const DEVIS_KEY   = 'uas_devis';

let clients  = [];
let devis    = [];
let editingId = null;
let modalMode = 'client'; // 'client' | 'devis' | 'facture'
let currentTab = 'clients';

const TYPES_CLIENT = { particulier:'🏠', entreprise:'🏢', collectivite:'🏛️', association:'🤝', autre:'📋' };
const STATUTS_DEVIS = {
  brouillon:  { label:'Brouillon',   bg:'var(--light-blue)',   color:'var(--blue)' },
  envoye:     { label:'Envoyé',      bg:'var(--light-amber)',  color:'var(--amber)' },
  accepte:    { label:'Accepté ✅',  bg:'var(--light-green)',  color:'var(--green)' },
  refuse:     { label:'Refusé',      bg:'var(--light-red)',    color:'var(--red)' },
  facture:    { label:'Facturé',     bg:'var(--light-purple)', color:'var(--purple)' },
};

// ─── LOAD/SAVE ────────────────────────────────────────────
function load(){
  try{ clients=JSON.parse(localStorage.getItem(CLIENTS_KEY)||'[]'); }catch{ clients=[]; }
  try{ devis=JSON.parse(localStorage.getItem(DEVIS_KEY)||'[]'); }catch{ devis=[]; }
}
function saveClients(){ localStorage.setItem(CLIENTS_KEY,JSON.stringify(clients)); }
function saveDevis(){ localStorage.setItem(DEVIS_KEY,JSON.stringify(devis)); }

function getConfig(){ try{return JSON.parse(localStorage.getItem('uas_config')||'{}');}catch{return{};} }

// ─── TABS ─────────────────────────────────────────────────
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab-section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById(`tab-${tab}`).classList.add('active');
  event.target.classList.add('active');
  renderAll();
}

function openNewModal(){
  if(currentTab==='clients') openClientModal();
  else if(currentTab==='devis'||currentTab==='factures') openDevisModal();
}

// ─── RENDER ALL ───────────────────────────────────────────
function renderAll(){
  renderClients();
  renderDevis();
  renderFactures();
  renderStats();
}

// ─── CLIENTS ─────────────────────────────────────────────
function renderClients(filter=''){
  const totalCA=devis.filter(d=>d.statut==='accepte'||d.statut==='facture').reduce((s,d)=>s+(d.total||0),0);
  const activeClients=clients.filter(c=>devis.some(d=>d.clientId===c.id)).length;

  document.getElementById('kpi-clients').innerHTML=`
    <div class="kpi-tile"><div class="kv">${clients.length}</div><div class="kl">Clients</div></div>
    <div class="kpi-tile"><div class="kv">${activeClients}</div><div class="kl">Actifs</div></div>
    <div class="kpi-tile"><div class="kv" style="color:var(--green);">${formatEuro(totalCA)}</div><div class="kl">CA total</div></div>
  `;

  const filtered=clients.filter(c=>
    !filter||(c.nom||'').toLowerCase().includes(filter.toLowerCase())||
    (c.email||'').toLowerCase().includes(filter.toLowerCase())
  );

  const el=document.getElementById('clients-list');
  if(filtered.length===0){
    el.innerHTML=`<div class="empty"><div class="empty-icon">👤</div>${filter?'Aucun résultat':'Aucun client enregistré'}<br><button onclick="openClientModal()" style="margin-top:10px;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;">+ Ajouter un client</button></div>`;
    return;
  }

  el.innerHTML=filtered.map(c=>{
    const emoji=TYPES_CLIENT[c.type]||'📋';
    const clientDevis=devis.filter(d=>d.clientId===c.id);
    const clientCA=clientDevis.filter(d=>d.statut==='accepte'||d.statut==='facture').reduce((s,d)=>s+(d.total||0),0);
    return`<div class="client-card">
      <div class="client-card-top" onclick="viewClient('${c.id}')">
        <div class="client-avatar" style="background:${c.color||'var(--light-blue)'};color:${c.colorText||'var(--navy)'};">${emoji}</div>
        <div class="client-info">
          <div class="client-name">${c.nom}</div>
          <div class="client-type">${c.email||''} ${c.tel?'· '+c.tel:''}</div>
          <div class="client-stats">
            <div class="client-stat"><span>${clientDevis.length}</span> devis</div>
            <div class="client-stat">CA : <span>${formatEuro(clientCA)}</span></div>
          </div>
        </div>
      </div>
      <div class="client-actions">
        <button class="client-action primary" onclick="openDevisModal('${c.id}')">📄 Devis</button>
        <button class="client-action" onclick="editClientModal('${c.id}')">✏️ Modifier</button>
        <button class="client-action" onclick="emailClient('${c.id}')">📧 Email</button>
        <button class="client-action danger" onclick="deleteClient('${c.id}')">🗑️</button>
      </div>
    </div>`;
  }).join('');
}

function filterClients(){
  renderClients(document.getElementById('search-clients').value);
}

// ─── CLIENT MODAL ─────────────────────────────────────────
function openClientModal(prefillId=''){
  editingId=prefillId||null;
  modalMode='client';
  const c=clients.find(x=>x.id===prefillId)||{};

  document.getElementById('modal-title').textContent=prefillId?'Modifier le client':'Nouveau client';
  document.getElementById('modal-body').innerHTML=`
    <div class="field-row">
      <div class="field"><label>Nom / Raison sociale *</label><input id="c-nom" value="${c.nom||''}"></div>
      <div class="field"><label>Type</label>
        <select id="c-type">
          ${Object.entries(TYPES_CLIENT).map(([k,v])=>`<option value="${k}" ${c.type===k?'selected':''}>${v} ${k.charAt(0).toUpperCase()+k.slice(1)}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field"><label>Email</label><input type="email" id="c-email" value="${c.email||''}"></div>
      <div class="field"><label>Téléphone</label><input type="tel" id="c-tel" value="${c.tel||''}"></div>
    </div>
    <div class="field-row full">
      <div class="field"><label>Adresse</label><input id="c-adresse" value="${c.adresse||''}"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>SIRET (optionnel)</label><input id="c-siret" value="${c.siret||''}"></div>
      <div class="field"><label>Site web</label><input id="c-web" value="${c.web||''}"></div>
    </div>
    <div class="field-row full">
      <div class="field"><label>Notes</label><textarea id="c-notes">${c.notes||''}</textarea></div>
    </div>
  `;
  document.getElementById('modal-footer').innerHTML=`
    <button class="btn btn-outline" onclick="closeModal()" style="flex:0 0 auto;padding:11px 14px;">Annuler</button>
    <button class="btn btn-primary" onclick="saveClient()" style="flex:1;">💾 Enregistrer</button>
  `;
  document.getElementById('modal-overlay').classList.add('open');
}

function editClientModal(id){ openClientModal(id); }

function saveClient(){
  const nom=document.getElementById('c-nom').value.trim();
  if(!nom){showToast('⚠️ Nom requis','amber');return;}

  const colors={particulier:['#E6F1FB','#185FA5'],entreprise:['#E8F5E9','#1D6B37'],collectivite:['#EDE7F6','#5C35A0'],association:['#E0F2F1','#006064'],autre:['#F8FAFD','#5A6478']};
  const type=document.getElementById('c-type').value;
  const [bg,txt]=colors[type]||['#E6F1FB','#185FA5'];

  const client={
    id:editingId||'cli-'+Date.now(),
    nom, type,
    email:document.getElementById('c-email').value,
    tel:document.getElementById('c-tel').value,
    adresse:document.getElementById('c-adresse').value,
    siret:document.getElementById('c-siret').value,
    web:document.getElementById('c-web').value,
    notes:document.getElementById('c-notes').value,
    color:bg, colorText:txt,
    createdAt:editingId?clients.find(c=>c.id===editingId)?.createdAt:new Date().toISOString(),
  };

  if(editingId){
    const idx=clients.findIndex(c=>c.id===editingId);
    if(idx!==-1) clients[idx]=client;
    showToast('✅ Client mis à jour');
  } else {
    clients.unshift(client);
    showToast('✅ Client ajouté');
  }
  saveClients();
  closeModal();
  renderAll();
}

function deleteClient(id){
  if(!confirm('Supprimer ce client et tous ses devis ?'))return;
  clients=clients.filter(c=>c.id!==id);
  devis=devis.filter(d=>d.clientId!==id);
  saveClients(); saveDevis();
  renderAll();
  showToast('🗑️ Client supprimé','amber');
}

function emailClient(id){
  const c=clients.find(x=>x.id===id);
  if(!c||!c.email){showToast('⚠️ Pas d\'email enregistré','amber');return;}
  const cfg=getConfig();
  window.open(`mailto:${c.email}?subject=Mission UAS — ${cfg.nom||'CONTE Philippe'}`);
}

// ─── DEVIS ────────────────────────────────────────────────
function renderDevis(){
  const allDevis=devis.filter(d=>d.statut!=='facture');
  const totalDA=allDevis.filter(d=>d.statut==='envoye'||d.statut==='accepte').reduce((s,d)=>s+(d.total||0),0);
  const acceptes=allDevis.filter(d=>d.statut==='accepte').length;

  document.getElementById('kpi-devis').innerHTML=`
    <div class="kpi-tile"><div class="kv">${allDevis.length}</div><div class="kl">Devis</div></div>
    <div class="kpi-tile"><div class="kv" style="color:var(--green);">${acceptes}</div><div class="kl">Acceptés</div></div>
    <div class="kpi-tile"><div class="kv" style="color:var(--amber);">${formatEuro(totalDA)}</div><div class="kl">En attente</div></div>
  `;

  const el=document.getElementById('devis-list');
  if(allDevis.length===0){
    el.innerHTML=`<div class="empty"><div class="empty-icon">📄</div>Aucun devis<br><button onclick="openDevisModal()" style="margin-top:10px;background:var(--blue);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;">+ Créer un devis</button></div>`;
    return;
  }

  el.innerHTML=[...allDevis].sort((a,b)=>b.date.localeCompare(a.date)).map(d=>devisCardHTML(d)).join('');
}

function renderFactures(){
  const factures=devis.filter(d=>d.statut==='facture');
  const totalF=factures.reduce((s,d)=>s+(d.total||0),0);
  const payees=factures.filter(d=>d.paye).length;

  document.getElementById('kpi-factures').innerHTML=`
    <div class="kpi-tile"><div class="kv">${factures.length}</div><div class="kl">Factures</div></div>
    <div class="kpi-tile"><div class="kv" style="color:var(--green);">${payees}</div><div class="kl">Payées</div></div>
    <div class="kpi-tile"><div class="kv" style="color:var(--navy);">${formatEuro(totalF)}</div><div class="kl">CA facturé</div></div>
  `;

  const el=document.getElementById('factures-list');
  if(factures.length===0){
    el.innerHTML='<div class="empty"><div class="empty-icon">💶</div>Aucune facture</div>';
    return;
  }
  el.innerHTML=[...factures].sort((a,b)=>b.date.localeCompare(a.date)).map(d=>devisCardHTML(d,true)).join('');
}

function editDevisModal(id){
  // Simplified: just open new modal pre-filled
  const d=devis.find(x=>x.id===id);
  if(!d)return;
  editingId=id;
  openDevisModal(d.clientId);
  setTimeout(()=>{

    if(document.getElementById('d-num')) document.getElementById('d-num').value=d.num||'';
    if(document.getElementById('d-date')) document.getElementById('d-date').value=d.date||'';
    if(document.getElementById('d-objet')) document.getElementById('d-objet').value=d.objet||'';
    if(document.getElementById('d-desc')) document.getElementById('d-desc').value=d.desc||'';

function addLigne(){
  const c=document.getElementById('lignes-container');
  const div=document.createElement('div');
  div.className='ligne-devis';
  div.innerHTML=`<input placeholder="Description" class="ld-desc"><input type="number" value="1" min="0" class="ld-qty" oninput="calcTotal()"><input type="number" value="0" min="0" class="ld-pu" oninput="calcTotal()"><button class="ligne-del" onclick="removeLigne(this)">✕</button>`;
  c.appendChild(div);
  calcTotal();
}

function removeLigne(btn){ btn.closest('.ligne-devis').remove(); calcTotal(); }

function calcTotal(){
  const lignes=document.querySelectorAll('#lignes-container .ligne-devis');
  let ht=0;
  lignes.forEach(l=>{
    const qty=parseFloat(l.querySelector('.ld-qty')?.value)||0;
    const pu=parseFloat(l.querySelector('.ld-pu')?.value)||0;
    ht+=qty*pu;
  });
  const tva=parseFloat(document.getElementById('d-tva')?.value)||20;
  const remise=parseFloat(document.getElementById('d-remise')?.value)||0;
  const htRemise=ht*(1-remise/100);
  const ttc=htRemise*(1+tva/100);
  const el=document.getElementById('total-val');
  const det=document.getElementById('total-detail');
  if(el) el.textContent=formatEuro(ttc);
  if(det) det.textContent=`HT : ${formatEuro(htRemise)} · TVA ${tva}% : ${formatEuro(htRemise*tva/100)}${remise>0?` · Remise ${remise}%`:''}`;
  return{ht,htRemise,ttc,tva,remise};
}

function saveDevisItem(){
  if(!clients.length){showToast('⚠️ Ajoutez un client d\'abord','amber');return;}
  const objet=document.getElementById('d-objet').value.trim();
  if(!objet){showToast('⚠️ Objet requis','amber');return;}

  const lignes=[];
  document.querySelectorAll('#lignes-container .ligne-devis').forEach(l=>{
    const desc=l.querySelector('.ld-desc')?.value;
    const qty=parseFloat(l.querySelector('.ld-qty')?.value)||0;
    const pu=parseFloat(l.querySelector('.ld-pu')?.value)||0;
    if(desc||pu) lignes.push({desc,qty,pu,total:qty*pu});
  });

  const totaux=calcTotal();
  const d={
    id:editingId||'dev-'+Date.now(),
    num:document.getElementById('d-num').value,
    date:document.getElementById('d-date').value,
    clientId:document.getElementById('d-client').value,
    objet, lignes,
    desc:document.getElementById('d-desc').value,
    tva:parseFloat(document.getElementById('d-tva').value)||20,
    remise:parseFloat(document.getElementById('d-remise').value)||0,
    ht:totaux.ht, htRemise:totaux.htRemise, total:totaux.ttc,
    statut:editingId?devis.find(x=>x.id===editingId)?.statut||'brouillon':'brouillon',
    mentions:document.getElementById('d-mentions').value,
    createdAt:new Date().toISOString(),
  };

  if(editingId){ const idx=devis.findIndex(x=>x.id===editingId); if(idx!==-1)devis[idx]=d; }
  else devis.unshift(d);

  saveDevis(); closeModal(); renderAll();
  showToast('✅ Devis enregistré');
}

function deleteDevis(id){
  if(!confirm('Supprimer ce devis ?'))return;
  devis=devis.filter(d=>d.id!==id);
  saveDevis(); renderAll();
  showToast('🗑️ Devis supprimé','amber');
}

function facturer(id){
  const d=devis.find(x=>x.id===id);
  if(!d)return;
  d.statut='facture';
  d.numFacture='FAC-'+new Date().getFullYear()+'-'+String(devis.filter(x=>x.statut==='facture').length).padStart(3,'0');
  d.dateFacture=new Date().toISOString().slice(0,10);
  saveDevis(); renderAll();
  showToast('✅ Devis converti en facture');
}

// ─── STATS ────────────────────────────────────────────────
function renderStats(){
  const now=new Date();
  const months=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];

  // CA par mois (12 derniers)
  const caByMonth={};
  devis.filter(d=>d.statut==='accepte'||d.statut==='facture').forEach(d=>{
    const key=d.date?.slice(0,7);
    if(key) caByMonth[key]=(caByMonth[key]||0)+(d.total||0);
  });

  const monthData=[];
  for(let i=11;i>=0;i--){
    const d=new Date(now.getFullYear(),now.getMonth()-i,1);
    const key=d.toISOString().slice(0,7);
    monthData.push({label:`${months[d.getMonth()]} ${d.getFullYear().toString().slice(2)}`,ca:caByMonth[key]||0});
  }

  const totalCA=Object.values(caByMonth).reduce((s,v)=>s+v,0);
  const thisMonthCA=caByMonth[now.toISOString().slice(0,7)]||0;
  const lastMonthCA=caByMonth[new Date(now.getFullYear(),now.getMonth()-1,1).toISOString().slice(0,7)]||0;

  document.getElementById('ca-stats').innerHTML=`
    <div class="kpi-bar">
      <div class="kpi-tile"><div class="kv" style="color:var(--green);">${formatEuro(totalCA)}</div><div class="kl">CA total</div></div>
      <div class="kpi-tile"><div class="kv" style="color:var(--blue);">${formatEuro(thisMonthCA)}</div><div class="kl">Ce mois</div></div>
      <div class="kpi-tile"><div class="kv">${formatEuro(lastMonthCA)}</div><div class="kl">Mois préc.</div></div>
    </div>
    <div class="kpi-bar" style="margin-top:0;">
      ${monthData.slice(-6).map(m=>`
        <div class="kpi-tile" style="padding:8px;">
          <div style="font-size:13px;font-weight:800;color:var(--navy);">${m.ca>0?formatEuro(m.ca):'—'}</div>
          <div style="font-size:9px;color:var(--text-muted);font-weight:600;">${m.label}</div>
        </div>`).join('')}
    </div>
  `;

  // Top clients
  const clientCA={};
  devis.filter(d=>d.statut==='accepte'||d.statut==='facture').forEach(d=>{
    clientCA[d.clientId]=(clientCA[d.clientId]||0)+(d.total||0);
  });
  const topClients=Object.entries(clientCA).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const maxCA=topClients[0]?.[1]||1;

  document.getElementById('top-clients').innerHTML=topClients.length
    ?topClients.map(([id,ca])=>{
      const c=clients.find(x=>x.id===id);
      return`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);">
        <div style="font-size:13px;font-weight:700;flex:0 0 120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${c?c.nom:'—'}</div>
        <div style="flex:1;height:7px;background:var(--border);border-radius:4px;overflow:hidden;">
          <div style="height:100%;width:${Math.round(ca/maxCA*100)}%;background:var(--blue);border-radius:4px;"></div>
        </div>
        <div style="font-size:12px;font-weight:700;color:var(--green);flex:0 0 70px;text-align:right;">${formatEuro(ca)}</div>
      </div>`;
    }).join('')
    :'<div style="font-size:12px;color:var(--text-muted);padding:8px 0;">Aucune donnée</div>';
}

// ─── HELPERS ──────────────────────────────────────────────
function formatEuro(n){ return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0}).format(n||0); }
function fmtDate(iso){ if(!iso)return'—'; const[y,m,d]=iso.split('-'); return`${d}/${m}/${y}`; }
function viewClient(id){ console.log('view',id); }

function closeModal(){ document.getElementById('modal-overlay').classList.remove('open'); editingId=null; }
document.getElementById('modal-overlay').addEventListener('click',e=>{ if(e.target===document.getElementById('modal-overlay'))closeModal(); });

let toastTimer=null;
function showToast(msg,type=''){
  const t=document.getElementById('toast');
  t.textContent=msg; t.className=`visible ${type}`;
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.className='',3000);
}

// ─── INIT ─────────────────────────────────────────────────
load();
renderAll();
</script>
</body>
</html>
