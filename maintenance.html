<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>UAS Manager — Maintenance UAS</title>
<style>
:root{
  --navy:#0C447C;--blue:#185FA5;--light-blue:#E6F1FB;
  --green:#1D6B37;--light-green:#E8F5E9;
  --amber:#BA7517;--light-amber:#FAEEDA;
  --red:#8B2020;--light-red:#FDECEC;
  --teal:#006064;--light-teal:#E0F2F1;
  --bg:#F0F4FA;--surface:#FFFFFF;--surface2:#F8FAFD;
  --text:#0D1220;--text-muted:#5A6478;--border:#D0DCF0;
  --shadow:0 2px 12px rgba(12,68,124,.10);
  --radius:14px;--header-h:56px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#0D1220;--surface:#161E30;--surface2:#1C2840;--text:#E8EEF8;--text-muted:#7A8BAA;--border:#253050;--light-blue:#1A2D4A;--light-amber:#2A1E00;--light-green:#0F2318;--light-red:#2A0D0D;--light-teal:#003030;}
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;font-family:-apple-system,'SF Pro Text',BlinkMacSystemFont,system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}
#header{position:sticky;top:0;z-index:200;background:var(--navy);display:flex;align-items:center;justify-content:space-between;padding:env(safe-area-inset-top) 16px 0;height:calc(var(--header-h) + env(safe-area-inset-top));box-shadow:0 2px 12px rgba(12,68,124,.3);overflow:hidden;}
#header::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 80%,rgba(24,95,165,.4),transparent 60%);pointer-events:none;}
#header h1{font-size:17px;font-weight:800;color:#fff;display:flex;align-items:center;gap:7px;position:relative;z-index:1;}
.back-btn{background:rgba(255,255,255,.14);border:none;border-radius:8px;color:#fff;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:4px;transition:background .15s;position:relative;z-index:1;flex-shrink:0;}
.back-btn:active{background:rgba(255,255,255,.28);}
.hdr-actions{display:flex;gap:8px;align-items:center;position:relative;z-index:1;}
.btn-hdr{background:rgba(255,255,255,.14);border:none;border-radius:8px;color:#fff;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;}
#tab-nav{background:var(--surface);border-bottom:1px solid var(--border);display:flex;position:sticky;top:calc(var(--header-h) + env(safe-area-inset-top));z-index:100;}
.tab-btn{flex:1;background:none;border:none;border-bottom:2.5px solid transparent;color:var(--text-muted);font-size:12px;font-weight:700;padding:10px 4px;cursor:pointer;font-family:inherit;transition:all .15s;}
.tab-btn.active{color:var(--navy);border-bottom-color:var(--navy);}
@media(prefers-color-scheme:dark){.tab-btn.active{color:#7EB8F7;border-bottom-color:#7EB8F7;}}
.kpi-strip{display:flex;gap:10px;padding:12px 14px 4px;overflow-x:auto;scrollbar-width:none;}
.kpi-strip::-webkit-scrollbar{display:none;}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-top:3px solid var(--blue);border-radius:12px;padding:10px 13px;min-width:100px;flex:1;}
.kpi-card.green{border-top-color:var(--green);}
.kpi-card.amber{border-top-color:var(--amber);}
.kpi-card.red{border-top-color:var(--red);}
.kpi-value{font-size:19px;font-weight:800;color:var(--navy);}
@media(prefers-color-scheme:dark){.kpi-value{color:#7EB8F7;}}
.kpi-label{font-size:10px;color:var(--text-muted);margin-top:3px;line-height:1.2;}
.list-toolbar{padding:10px 14px 6px;display:flex;gap:8px;align-items:center;}
.search-wrap{flex:1;position:relative;}
.search-wrap input{width:100%;padding:9px 12px 9px 34px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;font-family:inherit;outline:none;}
.search-wrap input:focus{border-color:var(--blue);}
.search-wrap::before{content:'🔍';position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;}
.btn-add{background:var(--blue);color:#fff;border:none;border-radius:10px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;}
#list-area{padding:0 14px calc(80px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:10px;margin-top:4px;}
.maint-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);animation:fadeUp .3s both;}
.maint-card.urgent{border-color:var(--red);}
.maint-card.attention{border-color:var(--amber);}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.maint-card-top{display:flex;align-items:flex-start;gap:10px;padding:11px 12px 6px;}
.maint-type-icon{font-size:20px;flex-shrink:0;margin-top:1px;}
.maint-info{flex:1;min-width:0;}
.maint-title{font-size:14px;font-weight:800;}
.maint-sub{font-size:11px;color:var(--text-muted);margin-top:2px;}
.badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px;white-space:nowrap;}
.maint-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;padding:0 12px 8px;}
.mf .mfl{font-size:9px;text-transform:uppercase;color:var(--text-muted);letter-spacing:.5px;}
.mf .mfv{font-size:12px;font-weight:600;}
.maint-foot{padding:7px 12px;background:rgba(0,0,0,.02);display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);}
.maint-tech{font-size:11px;color:var(--text-muted);}
.maint-actions{display:flex;gap:6px;}
.btn-sm{border:none;border-radius:7px;padding:5px 11px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-edit{background:var(--light-blue);color:var(--blue);}
.btn-del{background:var(--light-red);color:var(--red);}
.prochaine-badge{background:var(--light-amber);color:var(--amber);border-radius:8px;font-size:11px;font-weight:700;padding:3px 8px;}
.prochaine-badge.overdue{background:var(--light-red);color:var(--red);}
.empty-state{text-align:center;padding:50px 20px;color:var(--text-muted);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-box{background:var(--surface);width:100%;max-width:640px;margin:0 auto;border-radius:22px 22px 0 0;max-height:93vh;overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateY(100%);transition:transform .32s cubic-bezier(.32,1,.23,1);padding-bottom:calc(28px + env(safe-area-inset-bottom));}
.modal-overlay.open .modal-box{transform:translateY(0);}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:10px auto 0;}
.modal-header{padding:14px 16px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:5;}
.modal-title{font-size:17px;font-weight:800;color:var(--navy);}
@media(prefers-color-scheme:dark){.modal-title{color:#7EB8F7;}}
.btn-close{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:6px 13px;font-size:13px;font-weight:600;cursor:pointer;color:var(--text-muted);font-family:inherit;}
.form-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
.fsec{font-size:11px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:1px;padding:4px 0 3px;border-bottom:2px solid var(--light-blue);margin-top:2px;}
@media(prefers-color-scheme:dark){.fsec{color:#7EB8F7;border-bottom-color:var(--border);}}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.frow.tri{grid-template-columns:1fr 1fr 1fr;}
.frow.full{grid-template-columns:1fr;}
.fgroup{display:flex;flex-direction:column;gap:4px;}
.fgroup label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;}
.fgroup input,.fgroup select,.fgroup textarea{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:8px 10px;width:100%;font-family:inherit;-webkit-appearance:none;}
.fgroup input:focus,.fgroup select:focus,.fgroup textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(24,95,165,.12);}
.fgroup textarea{resize:vertical;min-height:60px;}
.submit-row{display:flex;gap:10px;margin-top:6px;}
.btn-submit{flex:1;padding:13px;border-radius:12px;border:none;background:var(--blue);color:#fff;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;}
.btn-cancel{padding:13px 16px;border-radius:12px;border:1.5px solid var(--border);background:transparent;color:var(--text-muted);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;}
.confirm-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:400;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
.confirm-overlay.open{opacity:1;pointer-events:all;}
.confirm-box{background:var(--surface);border-radius:18px;padding:24px;max-width:320px;width:90%;text-align:center;}
.confirm-box h3{font-size:17px;font-weight:800;margin-bottom:8px;}
.confirm-box p{font-size:14px;color:var(--text-muted);margin-bottom:18px;}
.confirm-btns{display:flex;gap:10px;}
.confirm-btns button{flex:1;padding:12px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}
.btn-cc{background:var(--bg);color:var(--text);}
.btn-cd{background:var(--red);color:#fff;}
#toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(50px);background:var(--navy);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:500;white-space:nowrap;transition:transform .28s cubic-bezier(.34,1.2,.64,1);pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.2);}
#toast.show{transform:translateX(-50%) translateY(0);}
.sec-inner{padding:14px;}
</style>
</head>
<body>
<header id="header">
  <h1>🔧 Maintenance UAS</h1>
  <div class="hdr-actions">
    <button class="btn-hdr" onclick="openModal()" title="Nouvelle intervention">＋</button>
    <a class="back-btn" href="index.html">← Accueil</a>
  </div>
</header>

<div id="tab-nav">
  <button class="tab-btn active" onclick="switchTab('interventions',this)">🔧 Interventions</button>
  <button class="tab-btn" onclick="switchTab('rex',this)">📓 REX interne</button>
  <button class="tab-btn" onclick="switchTab('planning',this)">📅 Planning</button>
</div>

<div id="section-interventions">
  <div class="kpi-strip">
    <div class="kpi-card"><div class="kpi-value" id="kpiTotal">0</div><div class="kpi-label">Interventions</div></div>
    <div class="kpi-card green"><div class="kpi-value" id="kpiHeures">0h</div><div class="kpi-label">Heures totales</div></div>
    <div class="kpi-card amber"><div class="kpi-value" id="kpiCout">0 €</div><div class="kpi-label">Coût total</div></div>
    <div class="kpi-card red"><div class="kpi-value" id="kpiUrgent">0</div><div class="kpi-label">À traiter</div></div>
  </div>
  <div class="list-toolbar">
    <div class="search-wrap"><input type="text" id="searchInput" placeholder="Rechercher…" oninput="renderList()"></div>
    <button class="btn-add" onclick="openModal()">＋ Intervention</button>
  </div>
  <div id="list-area"></div>
</div>

<div id="section-rex" style="display:none">
  <div class="sec-inner">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
      <div style="font-size:14px;font-weight:800;color:var(--navy);">REX Interne — Historique</div>
      <button class="btn-add" style="font-size:12px;padding:7px 12px;" onclick="openRexModal()">＋ REX</button>
    </div>
    <div id="rex-list"></div>
  </div>
</div>

<div id="section-planning" style="display:none">
  <div class="sec-inner">
    <div style="font-size:14px;font-weight:800;color:var(--navy);margin-bottom:12px;">Planning des révisions</div>
    <div id="planning-list"></div>
  </div>
</div>

<!-- Modal intervention -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOutside(event)">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Nouvelle intervention</span>
      <button class="btn-close" onclick="closeModal()">Fermer</button>
    </div>
    <div class="form-body">
      <div class="fsec">📋 Identification</div>
      <div class="frow">
        <div class="fgroup"><label>Date *</label><input type="date" id="fDate" required></div>
        <div class="fgroup">
          <label>Type *</label>
          <select id="fType" required>
            <option value="">-- Choisir --</option>
            <option value="revision">🔄 Révision périodique</option>
            <option value="remplacement">🔩 Remplacement pièce</option>
            <option value="calibration">🎯 Calibration</option>
            <option value="reparation">🔨 Réparation</option>
            <option value="nettoyage">🧹 Nettoyage</option>
            <option value="firmware">💾 Firmware</option>
            <option value="urgence">🚨 Urgente</option>
          </select>
        </div>
      </div>
      <div class="frow full">
        <div class="fgroup"><label>Description *</label><textarea id="fDesc" rows="3" placeholder="Décrivez l'intervention…" required></textarea></div>
      </div>
      <div class="fsec">🚁 UAS & Technicien</div>
      <div class="frow">
        <div class="fgroup"><label>UAS</label><input type="text" id="fUAS" placeholder="DJI Mavic 4 Pro"></div>
        <div class="fgroup"><label>Technicien</label><input type="text" id="fTech" placeholder="Prénom Nom"></div>
      </div>
      <div class="fsec">⏱️ Heures de vol</div>
      <div class="frow tri">
        <div class="fgroup"><label>Heures avant</label><input type="number" id="fHAvant" min="0" step="0.1" placeholder="0.0"></div>
        <div class="fgroup"><label>Heures après</label><input type="number" id="fHApres" min="0" step="0.1" placeholder="0.0"></div>
        <div class="fgroup"><label>Prochaine (h)</label><input type="number" id="fProchaine" min="0" placeholder="ex: 50"></div>
      </div>
      <div class="fsec">🔩 Pièces & Coût</div>
      <div class="frow full">
        <div class="fgroup"><label>Pièces remplacées</label><input type="text" id="fPieces" placeholder="ex: Hélices × 4, Batterie…"></div>
      </div>
      <div class="frow">
        <div class="fgroup"><label>Coût (€ TTC)</label><input type="number" id="fCout" min="0" step="0.01" placeholder="0.00"></div>
        <div class="fgroup"><label>Prochaine révision (date)</label><input type="date" id="fNextDate"></div>
      </div>
      <div class="frow full">
        <div class="fgroup"><label>Notes</label><textarea id="fNotes" rows="2" placeholder="Observations…"></textarea></div>
      </div>
      <div class="submit-row">
        <button class="btn-submit" onclick="saveIntervention()">💾 Enregistrer</button>
        <button class="btn-cancel" onclick="closeModal()">✕ Annuler</button>
      </div>
    </div>
  </div>
</div>

<!-- Modal REX -->
<div class="modal-overlay" id="rexModalOverlay" onclick="closeRexOut(event)">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title">Nouvelle entrée REX</span>
      <button class="btn-close" onclick="closeRexModal()">Fermer</button>
    </div>
    <div class="form-body">
      <div class="frow">
        <div class="fgroup"><label>Date *</label><input type="date" id="rDate" required></div>
        <div class="fgroup"><label>UAS</label><input type="text" id="rUAS" placeholder="DJI Mavic 4 Pro"></div>
      </div>
      <div class="fgroup"><label>Titre / événement *</label><input type="text" id="rTitre" placeholder="Résumé de l'événement" required></div>
      <div class="fgroup"><label>Description détaillée</label><textarea id="rDesc" rows="4" placeholder="Contexte, causes, conséquences…"></textarea></div>
      <div class="frow">
        <div class="fgroup">
          <label>Gravité</label>
          <select id="rGravite">
            <option value="info">ℹ️ Information</option>
            <option value="mineur">🟡 Mineur</option>
            <option value="modere">🟠 Modéré</option>
            <option value="grave">🔴 Grave</option>
          </select>
        </div>
        <div class="fgroup">
          <label>Phase de vol</label>
          <select id="rPhase">
            <option value="">--</option>
            <option>Pré-vol</option><option>Décollage</option><option>En vol</option><option>Atterrissage</option><option>Post-vol</option>
          </select>
        </div>
      </div>
      <div class="fgroup"><label>Actions correctives</label><textarea id="rActions" rows="2" placeholder="Mesures prises ou à prendre…"></textarea></div>
      <div class="submit-row">
        <button class="btn-submit" onclick="saveRex()">💾 Enregistrer REX</button>
        <button class="btn-cancel" onclick="closeRexModal()">✕ Annuler</button>
      </div>
    </div>
  </div>
</div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h3>Supprimer ?</h3>
    <p>Cette action est irréversible.</p>
    <div class="confirm-btns">
      <button class="btn-cc" onclick="cancelDel()">Annuler</button>
      <button class="btn-cd" onclick="confirmDel()">Supprimer</button>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
'use strict';
const KEY_M='uas_maintenance',KEY_R='uas_rex_interne';
let items=[],rexItems=[],editId=null,deleteId=null,deleteType=null,currentTab='interventions';
function load(){try{items=JSON.parse(localStorage.getItem(KEY_M))||[];}catch{items=[];}try{rexItems=JSON.parse(localStorage.getItem(KEY_R))||[];}catch{rexItems=[];}}
function save(){localStorage.setItem(KEY_M,JSON.stringify(items));}
function saveRex2(){localStorage.setItem(KEY_R,JSON.stringify(rexItems));}
let toastTimer;
function toast(msg,color='var(--navy)'){const t=document.getElementById('toast');t.textContent=msg;t.style.background=color;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2600);}
function switchTab(tab,el){currentTab=tab;document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));el.classList.add('active');['interventions','rex','planning'].forEach(t=>{document.getElementById('section-'+t).style.display=t===tab?'':'none';});if(tab==='rex')renderRex();if(tab==='planning')renderPlanning();}
function updateKPIs(){const total=items.length;const h=items.reduce((s,i)=>s+(parseFloat(i.hApres)||0),0);const cout=items.reduce((s,i)=>s+(parseFloat(i.cout)||0),0);const urgent=items.filter(i=>i.type==='urgence'||isOverdue(i.nextDate)).length;document.getElementById('kpiTotal').textContent=total;document.getElementById('kpiHeures').textContent=h.toFixed(1)+'h';document.getElementById('kpiCout').textContent=cout.toFixed(0)+' €';document.getElementById('kpiUrgent').textContent=urgent;}
function isOverdue(d){if(!d)return false;return new Date(d)<new Date();}
function daysUntil(d){if(!d)return null;return Math.floor((new Date(d)-new Date())/86400000);}
function renderList(){
  const q=document.getElementById('searchInput').value.toLowerCase();
  const c=document.getElementById('list-area');
  let list=[...items];
  if(q)list=list.filter(i=>(i.desc||'').toLowerCase().includes(q)||(i.type||'').includes(q)||(i.tech||'').toLowerCase().includes(q));
  list.sort((a,b)=>b.date.localeCompare(a.date));
  if(!list.length){c.innerHTML=`<div class="empty-state"><div class="empty-icon">🔧</div><p>${q?'Aucun résultat.':'Aucune intervention enregistrée.'}</p></div>`;return;}
  const typeIcon={revision:'🔄',remplacement:'🔩',calibration:'🎯',reparation:'🔨',nettoyage:'🧹',firmware:'💾',urgence:'🚨'};
  const typeLabel={revision:'Révision',remplacement:'Remplacement',calibration:'Calibration',reparation:'Réparation',nettoyage:'Nettoyage',firmware:'Firmware',urgence:'Urgente'};
  c.innerHTML=list.map((item,i)=>{
    const overdue=isOverdue(item.nextDate);const du=daysUntil(item.nextDate);
    const cardCls=item.type==='urgence'?'urgent':overdue?'attention':'';
    return `<div class="maint-card ${cardCls}" style="animation-delay:${i*.04}s">
      <div class="maint-card-top">
        <div class="maint-type-icon">${typeIcon[item.type]||'🔧'}</div>
        <div class="maint-info"><div class="maint-title">${item.desc?.slice(0,60)||'—'}</div><div class="maint-sub">${fmtDate(item.date)}${item.uas?' · '+item.uas:''}</div></div>
        <span class="badge" style="background:var(--light-blue);color:var(--blue)">${typeLabel[item.type]||item.type}</span>
      </div>
      <div class="maint-grid">
        ${item.hAvant?`<div class="mf"><span class="mfl">Heures avant</span><span class="mfv">${item.hAvant}h</span></div>`:''}
        ${item.hApres?`<div class="mf"><span class="mfl">Heures après</span><span class="mfv">${item.hApres}h</span></div>`:''}
        ${item.prochaine?`<div class="mf"><span class="mfl">Prochain (h)</span><span class="mfv" style="color:var(--amber)">${item.prochaine}h</span></div>`:''}
        ${item.pieces?`<div class="mf" style="grid-column:1/-1"><span class="mfl">Pièces</span><span class="mfv">${item.pieces}</span></div>`:''}
        ${item.cout?`<div class="mf"><span class="mfl">Coût</span><span class="mfv" style="color:var(--green)">${parseFloat(item.cout).toFixed(2)} €</span></div>`:''}
      </div>
      <div class="maint-foot">
        <span class="maint-tech">👤 ${item.tech||'—'}</span>
        <div style="display:flex;align-items:center;gap:8px;">
          ${item.nextDate?`<span class="prochaine-badge${overdue?' overdue':''}">${overdue?'⚠️ En retard':du===0?'Aujourd\'hui':du>0?'J-'+du:'—'}</span>`:''}
          <div class="maint-actions">
            <button class="btn-sm btn-edit" onclick="openModal('${item.id}')">✏️</button>
            <button class="btn-sm btn-del" onclick="askDel('${item.id}','maint')">🗑</button>
          </div>
        </div>
      </div>
      ${item.notes?`<div style="padding:6px 12px 8px;font-size:11px;color:var(--text-muted);border-top:1px solid var(--border);">📝 ${item.notes}</div>`:''}
    </div>`;
  }).join('');
}
function renderRex(){
  const c=document.getElementById('rex-list');
  if(!rexItems.length){c.innerHTML=`<div class="empty-state"><div class="empty-icon">📓</div><p>Aucun REX enregistré.</p></div>`;return;}
  const gravCol={info:'var(--blue)',mineur:'var(--amber)',modere:'var(--amber)',grave:'var(--red)'};
  const gravTxt={info:'ℹ️ Info',mineur:'🟡 Mineur',modere:'🟠 Modéré',grave:'🔴 Grave'};
  c.innerHTML=[...rexItems].sort((a,b)=>b.date.localeCompare(a.date)).map(r=>`
    <div style="background:var(--surface);border:1.5px solid var(--border);border-left:4px solid ${gravCol[r.gravite]||'var(--border)'};border-radius:var(--radius);padding:12px;margin-bottom:10px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
        <div style="font-size:13px;font-weight:800;">${r.titre}</div>
        <span style="font-size:10px;font-weight:700;padding:3px 8px;border-radius:8px;background:var(--bg);color:${gravCol[r.gravite]||'var(--text-muted)'};">${gravTxt[r.gravite]||r.gravite}</span>
      </div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:3px;">${fmtDate(r.date)}${r.uas?' · '+r.uas:''}${r.phase?' · '+r.phase:''}</div>
      ${r.desc?`<div style="font-size:12px;color:var(--text);margin-top:7px;line-height:1.4;">${r.desc}</div>`:''}
      ${r.actions?`<div style="font-size:12px;color:var(--green);margin-top:5px;">→ ${r.actions}</div>`:''}
      <div style="margin-top:8px;text-align:right;"><button class="btn-sm btn-del" onclick="askDel('${r.id}','rex')">🗑</button></div>
    </div>`).join('');
}
function renderPlanning(){
  const c=document.getElementById('planning-list');
  const upcoming=items.filter(i=>i.nextDate).sort((a,b)=>a.nextDate.localeCompare(b.nextDate));
  if(!upcoming.length){c.innerHTML=`<div class="empty-state"><div class="empty-icon">📅</div><p>Aucune révision planifiée.</p></div>`;return;}
  c.innerHTML=upcoming.map(item=>{
    const du=daysUntil(item.nextDate);const overdue=du!==null&&du<0;
    const color=overdue?'var(--red)':du<=14?'var(--amber)':'var(--green)';
    return `<div style="background:var(--surface);border:1.5px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px;display:flex;align-items:center;gap:12px;">
      <div style="width:52px;height:52px;border-radius:10px;background:${color}18;border:2px solid ${color};display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;">
        <div style="font-size:16px;font-weight:900;color:${color};line-height:1;">${overdue?'!':du===0?'0':du}</div>
        <div style="font-size:8px;color:${color};font-weight:700;">${overdue?'RETARD':du===0?'AUJ':'JOURS'}</div>
      </div>
      <div>
        <div style="font-size:13px;font-weight:700;">${item.desc?.slice(0,50)||'Révision'}</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">Prévue le ${fmtDate(item.nextDate)}${item.uas?' · '+item.uas:''}</div>
        ${item.prochaine?`<div style="font-size:11px;color:var(--amber);margin-top:1px;">⏱ Prochaine à ${item.prochaine}h</div>`:''}
      </div>
    </div>`;
  }).join('');
}
function openModal(id=null){
  editId=id;document.getElementById('modalTitle').textContent=id?'Modifier intervention':'Nouvelle intervention';
  if(id){const it=items.find(x=>x.id===id);if(it)fillForm(it);}else{clearForm();}
  document.getElementById('modalOverlay').classList.add('open');document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');document.body.style.overflow='';}
function closeModalOutside(e){if(e.target===document.getElementById('modalOverlay'))closeModal();}
function clearForm(){['fDate','fType','fDesc','fUAS','fTech','fHAvant','fHApres','fProchaine','fPieces','fCout','fNextDate','fNotes'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});document.getElementById('fDate').value=new Date().toISOString().slice(0,10);try{const c=JSON.parse(localStorage.getItem('uas_config')||'{}');const d=(c.drones||[]).find(x=>x.primary)||{};if(d.nom)document.getElementById('fUAS').value=d.nom;}catch{}}
function fillForm(it){const map={fDate:'date',fType:'type',fDesc:'desc',fUAS:'uas',fTech:'tech',fHAvant:'hAvant',fHApres:'hApres',fProchaine:'prochaine',fPieces:'pieces',fCout:'cout',fNextDate:'nextDate',fNotes:'notes'};Object.entries(map).forEach(([id,key])=>{const el=document.getElementById(id);if(el&&it[key]!=null)el.value=it[key];});}
function saveIntervention(){
  const date=gv('fDate'),type=gv('fType'),desc=gv('fDesc').trim();
  if(!date||!type||!desc){toast('⚠️ Date, type et description obligatoires','var(--amber)');return;}
  const item={id:editId||crypto.randomUUID(),date,type,desc,uas:gv('fUAS'),tech:gv('fTech'),hAvant:gv('fHAvant'),hApres:gv('fHApres'),prochaine:gv('fProchaine'),pieces:gv('fPieces'),cout:gv('fCout'),nextDate:gv('fNextDate'),notes:gv('fNotes'),createdAt:editId?(items.find(x=>x.id===editId)?.createdAt||new Date().toISOString()):new Date().toISOString()};
  if(editId){const i=items.findIndex(x=>x.id===editId);if(i!==-1)items[i]=item;}else items.push(item);
  save();closeModal();renderAll();toast(editId?'✅ Mise à jour':'✅ Intervention enregistrée','var(--green)');
}
function openRexModal(){document.getElementById('rDate').value=new Date().toISOString().slice(0,10);try{const c=JSON.parse(localStorage.getItem('uas_config')||'{}');const d=(c.drones||[]).find(x=>x.primary)||{};if(d.nom)document.getElementById('rUAS').value=d.nom;}catch{}document.getElementById('rexModalOverlay').classList.add('open');document.body.style.overflow='hidden';}
function closeRexModal(){document.getElementById('rexModalOverlay').classList.remove('open');document.body.style.overflow='';}
function closeRexOut(e){if(e.target===document.getElementById('rexModalOverlay'))closeRexModal();}
function saveRex(){const titre=gv('rTitre').trim();if(!titre){toast('⚠️ Titre obligatoire','var(--amber)');return;}rexItems.push({id:crypto.randomUUID(),date:gv('rDate'),uas:gv('rUAS'),titre,desc:gv('rDesc'),gravite:gv('rGravite'),phase:gv('rPhase'),actions:gv('rActions'),createdAt:new Date().toISOString()});saveRex2();closeRexModal();renderRex();toast('✅ REX enregistré','var(--green)');}
function askDel(id,type){deleteId=id;deleteType=type;document.getElementById('confirmOverlay').classList.add('open');}
function cancelDel(){deleteId=null;deleteType=null;document.getElementById('confirmOverlay').classList.remove('open');}
function confirmDel(){if(deleteType==='maint'){items=items.filter(x=>x.id!==deleteId);save();renderAll();}else if(deleteType==='rex'){rexItems=rexItems.filter(x=>x.id!==deleteId);saveRex2();renderRex();}cancelDel();toast('🗑 Supprimé');}
function gv(id){const el=document.getElementById(id);return el?el.value:'';}
function fmtDate(d){if(!d)return'—';const[y,m,j]=d.split('-');return`${j}/${m}/${y}`;}
function renderAll(){updateKPIs();renderList();}
load();renderAll();
</script>
</body>
</html>
