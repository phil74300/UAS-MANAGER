<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>UAS Manager — Check-listes</title>
<style>
:root{
  --navy:#0C447C;--blue:#185FA5;--light-blue:#E6F1FB;
  --green:#1D6B37;--light-green:#E8F5E9;
  --amber:#BA7517;--light-amber:#FAEEDA;
  --red:#8B2020;--light-red:#FDECEC;
  --bg:#F0F4FA;--surface:#FFFFFF;--surface2:#F8FAFD;
  --text:#0D1220;--text-muted:#5A6478;--border:#D0DCF0;
  --shadow:0 2px 12px rgba(12,68,124,.10);
  --radius:14px;--header-h:56px;
}
@media(prefers-color-scheme:dark){
  :root{--bg:#0D1220;--surface:#161E30;--surface2:#1C2840;--text:#E8EEF8;--text-muted:#7A8BAA;--border:#253050;--light-blue:#1A2D4A;--light-amber:#2A1E00;--light-green:#0F2318;--light-red:#2A0D0D;}
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;font-family:-apple-system,'SF Pro Text',BlinkMacSystemFont,system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;}

/* ─── HEADER ─── */
#header{position:sticky;top:0;z-index:200;background:var(--navy);display:flex;align-items:center;justify-content:space-between;padding:env(safe-area-inset-top) 16px 0;height:calc(var(--header-h) + env(safe-area-inset-top));box-shadow:0 2px 12px rgba(12,68,124,.3);overflow:hidden;}
#header::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 80%,rgba(24,95,165,.4),transparent 60%);pointer-events:none;}
#header h1{font-size:17px;font-weight:800;color:#fff;display:flex;align-items:center;gap:7px;position:relative;z-index:1;}
.back-btn{background:rgba(255,255,255,.14);border:none;border-radius:8px;color:#fff;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:4px;transition:background .15s;position:relative;z-index:1;flex-shrink:0;}
.back-btn:active{background:rgba(255,255,255,.28);}

/* ─── MISSION BAR ─── */
#mission-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;position:sticky;top:calc(var(--header-h) + env(safe-area-inset-top));z-index:100;}
.mission-row{display:flex;gap:8px;align-items:center;}
.mission-row input{flex:1;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:7px 10px;font-family:inherit;}
.mission-row input:focus{outline:none;border-color:var(--blue);}
.btn-sm-action{background:var(--light-blue);color:var(--navy);border:none;border-radius:8px;padding:7px 11px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;}
@media(prefers-color-scheme:dark){.btn-sm-action{background:var(--border);color:#7EB8F7;}}

/* ─── TABS ─── */
#tab-nav{background:var(--surface);border-bottom:1px solid var(--border);display:flex;position:sticky;top:calc(var(--header-h) + env(safe-area-inset-top) + 50px);z-index:99;}
.tab-btn{flex:1;background:none;border:none;border-bottom:2.5px solid transparent;color:var(--text-muted);font-size:12px;font-weight:700;padding:10px 4px;cursor:pointer;font-family:inherit;transition:all .15s;letter-spacing:-.2px;}
.tab-btn.active{color:var(--navy);border-bottom-color:var(--navy);}
@media(prefers-color-scheme:dark){.tab-btn.active{color:#7EB8F7;border-bottom-color:#7EB8F7;}}

/* ─── PROGRESS ─── */
.progress-bar-wrap{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 14px;}
.progress-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.progress-pct{font-size:22px;font-weight:800;color:var(--navy);}
@media(prefers-color-scheme:dark){.progress-pct{color:#7EB8F7;}}
.progress-label{font-size:12px;color:var(--text-muted);}
.progress-track{background:var(--border);border-radius:4px;height:7px;overflow:hidden;}
.progress-fill{height:7px;border-radius:4px;background:var(--green);transition:width .4s ease;}
.progress-stats{font-size:11px;color:var(--text-muted);margin-top:5px;}

/* ─── ACTION BAR ─── */
.action-bar{display:flex;gap:6px;padding:8px 14px;border-bottom:1px solid var(--border);background:var(--surface);}
.action-btn{flex:1;padding:8px 4px;border:1.5px solid var(--border);border-radius:8px;font-size:11px;font-weight:700;font-family:inherit;cursor:pointer;background:var(--surface);color:var(--text);transition:all .15s;}
.action-btn.go{background:var(--light-green);border-color:var(--green);color:var(--green);}
.action-btn.nogo{background:var(--light-red);border-color:var(--red);color:var(--red);}
.action-btn.amber{background:var(--light-amber);border-color:var(--amber);color:var(--amber);}

/* ─── VERDICT ─── */
.verdict{display:none;margin:10px 14px 0;border-radius:12px;padding:12px 14px;}
.verdict.go{display:block;background:var(--light-green);border:1.5px solid var(--green);}
.verdict.nogo{display:block;background:var(--light-red);border:1.5px solid var(--red);}
.verdict-title{font-size:16px;font-weight:800;margin-bottom:4px;}
.verdict.go .verdict-title{color:var(--green);}
.verdict.nogo .verdict-title{color:var(--red);}
.verdict-sub{font-size:12px;color:var(--text-muted);}

/* ─── CHECKLIST ─── */
.section-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:1px;color:var(--text-muted);padding:14px 14px 4px;background:var(--bg);}
.cl-item{background:var(--surface);border-left:3px solid transparent;margin-bottom:1px;padding:11px 14px 11px 50px;position:relative;cursor:pointer;transition:background .15s;}
.cl-item.critical{border-left-color:var(--amber);}
.cl-item.nogo-item{border-left-color:var(--red);}
.cl-item.checked{background:var(--light-green);border-left-color:var(--green);}
.cl-item.checked-ko{background:var(--light-red);border-left-color:var(--red);}
.cl-checkbox{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:24px;height:24px;border:2px solid var(--border);border-radius:7px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent;transition:all .2s;}
.cl-item.checked .cl-checkbox{background:var(--green);border-color:var(--green);color:#fff;}
.cl-item.checked-ko .cl-checkbox{background:var(--red);border-color:var(--red);color:#fff;}
.cl-text{font-size:13px;font-weight:600;line-height:1.3;}
.cl-item.checked .cl-text{color:var(--green);text-decoration:line-through;}
.cl-item.checked-ko .cl-text{color:var(--red);}
.cl-sub{font-size:11px;color:var(--text-muted);margin-top:2px;}
.cl-badge{position:absolute;right:12px;top:50%;transform:translateY(-50%);font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;}
.badge-critical{background:var(--light-amber);color:var(--amber);}
.badge-nogo{background:var(--light-red);color:var(--red);}

/* ─── STATUS BAR ITEM ─── */
.cl-status-row{display:flex;gap:6px;position:absolute;right:10px;top:50%;transform:translateY(-50%);}
.cl-status-btn{width:26px;height:26px;border-radius:6px;border:none;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.sts-ok{background:var(--light-green);color:var(--green);}
.sts-ko{background:var(--light-red);color:var(--red);}

/* ─── SAVE MODAL ─── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:opacity .25s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-box{background:var(--surface);width:100%;max-width:560px;margin:0 auto;border-radius:22px 22px 0 0;padding:20px 16px calc(28px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .32s cubic-bezier(.32,1,.23,1);}
.modal-overlay.open .modal-box{transform:translateY(0);}
.modal-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px;}
.modal-title{font-size:17px;font-weight:800;color:var(--navy);margin-bottom:14px;}
@media(prefers-color-scheme:dark){.modal-title{color:#7EB8F7;}}
.fgroup{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.fgroup label{font-size:10px;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.6px;}
.fgroup input,.fgroup select,.fgroup textarea{background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:8px 10px;font-family:inherit;width:100%;}
.fgroup input:focus,.fgroup select:focus{outline:none;border-color:var(--blue);}
.save-row{display:flex;gap:10px;margin-top:4px;}
.btn-save{flex:1;padding:13px;border-radius:12px;border:none;background:var(--blue);color:#fff;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit;}
.btn-cancel-modal{padding:13px 16px;border-radius:12px;border:1.5px solid var(--border);background:transparent;color:var(--text-muted);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;}

/* ─── TOAST ─── */
#toast{position:fixed;bottom:calc(24px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(50px);background:var(--navy);color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:500;white-space:nowrap;transition:transform .28s cubic-bezier(.34,1.2,.64,1);pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.2);}
#toast.show{transform:translateX(-50%) translateY(0);}

.content-area{padding-bottom:calc(80px + env(safe-area-inset-bottom));}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<header id="header">
  <h1>☑️ Check-listes</h1>
  <a class="back-btn" href="index.html">← Accueil</a>
</header>

<!-- Mission bar -->
<div id="mission-bar">
  <div class="mission-row">
    <input type="text" id="missionInput" placeholder="N° mission / site (optionnel)">
    <button class="btn-sm-action" onclick="openSaveModal()">💾 Enregistrer</button>
    <button class="btn-sm-action" onclick="resetAll()" style="background:var(--light-red);color:var(--red);">↺ Reset</button>
  </div>
</div>

<!-- Tabs -->
<div id="tab-nav">
  <button class="tab-btn active" onclick="switchTab('prevol',this)">🛫 Pré-vol</button>
  <button class="tab-btn" onclick="switchTab('postvol',this)">🛬 Post-vol</button>
  <button class="tab-btn" onclick="switchTab('urgence',this)">🚨 Urgence</button>
</div>

<!-- Progress -->
<div class="progress-bar-wrap" id="progressWrap">
  <div class="progress-top">
    <span class="progress-pct" id="progressPct">0%</span>
    <span class="progress-label" id="progressLabel">0 / 0 éléments cochés</span>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  <div class="progress-stats" id="progressStats"></div>
</div>

<!-- Action bar -->
<div class="action-bar">
  <button class="action-btn go" onclick="checkAll()">✅ Tout cocher</button>
  <button class="action-btn nogo" onclick="uncheckAll()">✕ Décocher tout</button>
  <button class="action-btn amber" onclick="checkCritical()">⚡ Critiques seuls</button>
</div>

<!-- Verdict -->
<div class="verdict" id="verdict">
  <div class="verdict-title" id="verdictTitle"></div>
  <div class="verdict-sub" id="verdictSub"></div>
</div>

<div class="content-area" id="checklistArea"></div>

<!-- Save modal -->
<div class="modal-overlay" id="saveModal">
  <div class="modal-box">
    <div class="modal-handle"></div>
    <div class="modal-title">Enregistrer la mission</div>
    <div class="fgroup">
      <label>N° mission / référence</label>
      <input type="text" id="saveMission" placeholder="ex: M2026-042 — Thyez">
    </div>
    <div class="fgroup">
      <label>Date</label>
      <input type="date" id="saveDate">
    </div>
    <div class="fgroup">
      <label>RPIC (pilote)</label>
      <input type="text" id="saveRPIC" placeholder="Prénom Nom">
    </div>
    <div class="fgroup">
      <label>Site de vol</label>
      <input type="text" id="saveSite" placeholder="Commune, lieu-dit">
    </div>
    <div class="fgroup">
      <label>Notes</label>
      <textarea id="saveNotes" rows="2" placeholder="Observations…" style="background:var(--bg);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;padding:8px 10px;font-family:inherit;width:100%;resize:vertical;"></textarea>
    </div>
    <div class="save-row">
      <button class="btn-save" onclick="saveMission()">💾 Sauvegarder</button>
      <button class="btn-cancel-modal" onclick="closeSaveModal()">Annuler</button>
    </div>
  </div>
</div>

<div id="toast"></div>

        {id:'u51',text:'Contacter la fréquence locale ATC si possible'},
        {id:'u52',text:'Documenter l\'incident (heure, type, position)'},
        {id:'u53',text:'Déclarer à la DSAC si événement grave'},
      ]
    },
  ]
};

/* ══════════════════════════════════════
   ÉTAT
══════════════════════════════════════ */
let currentTab = 'prevol';
let states = { prevol:{}, postvol:{}, urgence:{} };

function loadStates(){
  try{const s=JSON.parse(localStorage.getItem('uas_checklist_states')||'{}');
    if(s.prevol)states.prevol=s.prevol;
    if(s.postvol)states.postvol=s.postvol;
    if(s.urgence)states.urgence=s.urgence;
  }catch{}
}
function saveStates(){localStorage.setItem('uas_checklist_states',JSON.stringify(states));}

/* ── Render ── */
function renderChecklist(){
  const cl=CHECKLISTS[currentTab];
  const st=states[currentTab];
  const area=document.getElementById('checklistArea');
  let html='';
  cl.forEach(sec=>{
    html+=`<div class="section-label">${sec.section}</div>`;
    sec.items.forEach(item=>{
      const s=st[item.id]||'none';
      const cls=s==='ok'?'checked':s==='ko'?'checked-ko':'';
      const critBadge=item.nogo?'<span class="cl-badge badge-nogo">NO-GO</span>':item.critical?'<span class="cl-badge badge-critical">Critique</span>':'';
      const checkChar=s==='ok'?'✓':s==='ko'?'✕':'';
      html+=`<div class="cl-item ${item.critical?'critical':''} ${item.nogo?'nogo-item':''} ${cls}" id="item-${item.id}">
        <div class="cl-checkbox">${checkChar}</div>
        <div class="cl-text">${item.text}</div>
        ${item.sub?`<div class="cl-sub">${item.sub}</div>`:''}
        ${critBadge}
        <div class="cl-status-row">
          <button class="cl-status-btn sts-ok" onclick="setStatus('${item.id}','ok',event)" title="OK">✓</button>
          <button class="cl-status-btn sts-ko" onclick="setStatus('${item.id}','ko',event)" title="Non conforme">✕</button>
        </div>
      </div>`;
    });
  });
  area.innerHTML=html;
  updateProgress();
}

function setStatus(id, status, e){
  if(e){e.stopPropagation();}
  const st=states[currentTab];
  st[id]=st[id]===status?'none':status;
  saveStates();
  renderChecklist();
}

function toggleItem(id){
  const st=states[currentTab];
  st[id]=st[id]==='ok'?'none':'ok';
  saveStates();
  renderChecklist();
}

function updateProgress(){
  const cl=CHECKLISTS[currentTab];
  const st=states[currentTab];
  let total=0,ok=0,ko=0,critKo=0;
  cl.forEach(sec=>sec.items.forEach(item=>{
    total++;
    const s=st[item.id]||'none';
    if(s==='ok')ok++;
    else if(s==='ko'){ko++;if(item.critical||item.nogo)critKo++;}
  }));
  const pct=total?Math.round(ok/total*100):0;
  document.getElementById('progressPct').textContent=pct+'%';
  document.getElementById('progressLabel').textContent=`${ok} / ${total} éléments conformes`;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressStats').textContent=ko?`⚠️ ${ko} non-conforme(s) — dont ${critKo} critique(s)`:'';
  // Verdict
  const v=document.getElementById('verdict');
  if(pct===100&&ko===0){
    v.className='verdict go';
    document.getElementById('verdictTitle').textContent='✅ AUTORISATION DE VOL (GO)';
    document.getElementById('verdictSub').textContent='Tous les éléments sont conformes. Le vol peut être effectué.';
  } else if(critKo>0){
    v.className='verdict nogo';
    document.getElementById('verdictTitle').textContent='🚫 VOL INTERDIT (NO-GO)';
    document.getElementById('verdictSub').textContent=`${critKo} élément(s) critique(s) non-conforme(s). Le vol ne peut pas être effectué.`;
  } else {
    v.className='verdict';
  }
}

/* ── Actions ── */
function checkAll(){
  const cl=CHECKLISTS[currentTab];
  cl.forEach(sec=>sec.items.forEach(item=>states[currentTab][item.id]='ok'));
  saveStates();renderChecklist();
}
function uncheckAll(){
  states[currentTab]={};
  saveStates();renderChecklist();
}
function checkCritical(){
  const cl=CHECKLISTS[currentTab];
  cl.forEach(sec=>sec.items.forEach(item=>{
    if(item.critical||item.nogo)states[currentTab][item.id]='ok';
  }));
  saveStates();renderChecklist();
}
function resetAll(){
  if(confirm('Réinitialiser toute la check-liste ?')){
    states[currentTab]={};
    saveStates();
    document.getElementById('missionInput').value='';
    renderChecklist();
    toast('↺ Check-liste réinitialisée');
  }
}

/* ── Tab ── */
function switchTab(tab, el){
  currentTab=tab;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderChecklist();
}

/* ── Save modal ── */
function openSaveModal(){
  document.getElementById('saveMission').value=document.getElementById('missionInput').value;
  document.getElementById('saveDate').value=new Date().toISOString().slice(0,10);
  try{const c=JSON.parse(localStorage.getItem('uas_config')||'{}');const p=(c.pilots||[]).find(x=>x.primary)||{};if(p.nom)document.getElementById('saveRPIC').value=p.nom;}catch{}
  document.getElementById('saveModal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeSaveModal(){document.getElementById('saveModal').classList.remove('open');document.body.style.overflow='';}

function saveMission(){
  const mission={
    id:crypto.randomUUID(),
    ref:document.getElementById('saveMission').value||'Sans référence',
    date:document.getElementById('saveDate').value,
    rpic:document.getElementById('saveRPIC').value,
    site:document.getElementById('saveSite').value,
    notes:document.getElementById('saveNotes').value,
    prevol:{...states.prevol},
    postvol:{...states.postvol},
    urgence:{...states.urgence},
    savedAt:new Date().toISOString()
  };
  try{
    const missions=JSON.parse(localStorage.getItem('uas_checklist_missions')||'[]');
    missions.push(mission);
    localStorage.setItem('uas_checklist_missions',JSON.stringify(missions));
    closeSaveModal();
    toast('✅ Mission enregistrée','var(--green)');
  }catch(e){toast('⚠️ Erreur de sauvegarde','var(--amber)');}
}

/* ── Toast ── */
let toastTimer;
function toast(msg,color='var(--navy)'){
  const t=document.getElementById('toast');
  t.textContent=msg;t.style.background=color;
  t.classList.add('show');clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>t.classList.remove('show'),2500);
}

/* ── Init ── */
loadStates();
renderChecklist();
</script>
</body>
</html>
