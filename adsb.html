<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>UAS Manager — ADS-B Trafic</title>

<!-- Leaflet.js -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<style>
  :root {
    --navy:        #0C447C;
    --blue:        #185FA5;
    --light-blue:  #E6F1FB;
    --green:       #1D6B37;
    --light-green: #E8F5E9;
    --amber:       #BA7517;
    --light-amber: #FAEEDA;
    --red:         #8B2020;
    --light-red:   #FDECEC;
    --teal:        #006064;
    --bg:          #F4F7FB;
    --surface:     #FFFFFF;
    --text:        #1A1A2E;
    --text-muted:  #5A6478;
    --border:      #D0DCF0;
    --shadow:      0 2px 12px rgba(12,68,124,0.13);
    --radius:      12px;
    --tab-h:       64px;
    --disclaimer-h:46px;
    --header-h:    56px;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:         #0D1220;
      --surface:    #161E30;
      --text:       #E8EEF8;
      --text-muted: #7A8BAA;
      --border:     #253050;
      --light-blue: #1A2D4A;
      --light-amber:#2A1E00;
      --light-green:#0F2318;
      --light-red:  #2A0D0D;
    }
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    height: -webkit-fill-available;
    font-family: -apple-system, 'SF Pro Display', BlinkMacSystemFont, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── LAYOUT ─── */
  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    height: -webkit-fill-available;
    max-height: 100%;
    overflow: hidden;
  }

  /* ─── HEADER ─── */
  #header {
    background: var(--navy);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    height: var(--header-h);
    padding-top: env(safe-area-inset-top);
    flex-shrink: 0;
    z-index: 100;
  }
  #header h1 {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 0.3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  #header-actions { display: flex; gap: 8px; align-items: center; }

  .hdr-btn {
    background: rgba(255,255,255,0.15);
    border: none;
    border-radius: 8px;
    color: #fff;
    padding: 6px 12px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: background 0.15s;
  }
  .hdr-btn:active { background: rgba(255,255,255,0.28); }
  .hdr-btn.active { background: rgba(255,255,255,0.28); }

  /* ─── DISCLAIMER (immuable) ─── */
  #disclaimer {
    background: var(--light-amber);
    border-bottom: 2px solid var(--amber);
    color: var(--amber);
    font-size: 11.5px;
    font-weight: 600;
    text-align: center;
    padding: 8px 12px;
    line-height: 1.4;
    flex-shrink: 0;
    z-index: 99;
    letter-spacing: 0.1px;
  }
  @media (prefers-color-scheme: dark) {
    #disclaimer { color: #F0A020; border-color: #F0A020; }
  }

  /* ─── TOOLBAR ─── */
  #toolbar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    flex-shrink: 0;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    z-index: 90;
  }
  #toolbar::-webkit-scrollbar { display: none; }

  .tool-btn {
    background: var(--light-blue);
    border: 1.5px solid var(--border);
    border-radius: 8px;
    color: var(--navy);
    padding: 6px 12px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .tool-btn:active { opacity: 0.75; }
  .tool-btn.active {
    background: var(--blue);
    border-color: var(--blue);
    color: #fff;
  }
  .tool-sep {
    width: 1px;
    height: 24px;
    background: var(--border);
    flex-shrink: 0;
  }

  /* ─── COUNTDOWN ─── */
  #countdown-wrap {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  #countdown-ring {
    width: 30px;
    height: 30px;
    position: relative;
  }
  #countdown-ring svg { transform: rotate(-90deg); }
  #countdown-ring circle {
    fill: none;
    stroke-width: 3;
  }
  #ring-bg { stroke: var(--border); }
  #ring-progress { stroke: var(--green); stroke-linecap: round; transition: stroke-dashoffset 1s linear; }
  #countdown-num {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 10px;
    font-weight: 700;
    color: var(--green);
  }
  #status-text {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    white-space: nowrap;
  }

  /* ─── MAP ─── */
  #map-container {
    flex: 1;
    position: relative;
    overflow: hidden;
    min-height: 0;
  }
  #map {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
  }

  /* ─── STATS OVERLAY ─── */
  #stats-overlay {
    position: absolute;
    bottom: 12px;
    left: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 12px;
    z-index: 500;
    box-shadow: var(--shadow);
    min-width: 140px;
  }
  .stat-row { display: flex; justify-content: space-between; gap: 12px; align-items: center; }
  .stat-row + .stat-row { margin-top: 4px; }
  .stat-label { color: var(--text-muted); font-weight: 500; }
  .stat-val { font-weight: 700; color: var(--navy); }
  @media (prefers-color-scheme: dark) { .stat-val { color: #7EB8F7; } }

  /* ─── PANEL DÉTAIL ─── */
  #detail-panel {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    padding: 16px;
    padding-bottom: calc(16px + env(safe-area-inset-bottom));
    z-index: 600;
    transform: translateY(100%);
    transition: transform 0.28s cubic-bezier(0.34,1.2,0.64,1);
    box-shadow: 0 -4px 24px rgba(12,68,124,0.15);
    max-height: 50%;
    overflow-y: auto;
  }
  #detail-panel.open { transform: translateY(0); }
  #detail-panel-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 12px;
    cursor: pointer;
  }
  #detail-panel h3 {
    font-size: 15px;
    font-weight: 700;
    color: var(--navy);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  @media (prefers-color-scheme: dark) { #detail-panel h3 { color: #7EB8F7; } }
  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .detail-cell {
    background: var(--light-blue);
    border-radius: 8px;
    padding: 8px 10px;
  }
  .detail-cell .dc-label { font-size: 10px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .detail-cell .dc-val { font-size: 14px; font-weight: 700; color: var(--text); margin-top: 2px; }
  #detail-close {
    position: absolute;
    top: 14px; right: 16px;
    width: 28px; height: 28px;
    background: var(--light-blue);
    border: none;
    border-radius: 50%;
    color: var(--text-muted);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
  }

  /* ─── TOAST ─── */
  #toast {
    position: absolute;
    top: 12px; left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--red);
    color: #fff;
    padding: 8px 16px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    z-index: 700;
    transition: transform 0.3s cubic-bezier(0.34,1.2,0.64,1);
    white-space: nowrap;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
  }
  #toast.visible { transform: translateX(-50%) translateY(0); }
  #toast.info { background: var(--blue); }
  #toast.amber { background: var(--amber); }

  /* ─── BACK BUTTON ─── */
  .back-btn {
    background: rgba(255,255,255,0.15);
    border: none;
    border-radius: 8px;
    color: #fff;
    padding: 6px 10px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 4px;
    text-decoration: none;
    transition: background 0.15s;
  }
  .back-btn:active { background: rgba(255,255,255,0.28); }

  /* ─── LEAFLET OVERRIDES ─── */
  .leaflet-control-zoom { border: none !important; box-shadow: var(--shadow) !important; }
  .leaflet-control-zoom a {
    background: var(--surface) !important;
    color: var(--navy) !important;
    border: 1px solid var(--border) !important;
    font-weight: 700 !important;
  }
  .leaflet-popup-content-wrapper {
    border-radius: 10px !important;
    box-shadow: var(--shadow) !important;
    background: var(--surface) !important;
    color: var(--text) !important;
  }
  .leaflet-popup-tip { background: var(--surface) !important; }

  /* ─── CERCLE RAYON CONFIGURABLE ─── */
  #radius-control {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  #radius-control label { font-size: 11px; color: var(--text-muted); font-weight: 600; white-space: nowrap; }
  #radius-input {
    width: 52px;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    padding: 4px 6px;
    font-size: 12px;
    font-weight: 600;
    background: var(--bg);
    color: var(--text);
    text-align: center;
  }

  /* ─── SPINNER ─── */
  .spin {
    display: inline-block;
    animation: rotate 1s linear infinite;
  }
  @keyframes rotate { to { transform: rotate(360deg); } }

  /* ─── ALTITUDE LEGEND ─── */
  #alt-legend {
    position: absolute;
    top: 12px; right: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 8px 10px;
    font-size: 11px;
    z-index: 500;
    box-shadow: var(--shadow);
  }
  #alt-legend .leg-title { font-weight: 700; color: var(--text-muted); margin-bottom: 6px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  .leg-row { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
  .leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
</style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <header id="header">
    <h1>✈️ ADS-B Trafic</h1>
    <div id="header-actions">
      <a class="back-btn" href="index.html">← Accueil</a>
      <div id="gps-badge" style="display:none;background:rgba(29,107,55,0.35);border:1px solid rgba(29,107,55,0.5);border-radius:8px;padding:4px 9px;font-size:11px;font-weight:700;color:#6FD492;white-space:nowrap;align-items:center;gap:4px;">
        📍 <span id="gps-acc">GPS</span>
      </div>
      <button class="hdr-btn" id="btn-my-pos" title="Activer le suivi GPS temps réel">
        📍 Suivi GPS
      </button>
    </div>
  </header>

  <!-- DISCLAIMER IMMUABLE -->
  <div id="disclaimer">
    ⚠️ Données non temps réel (délai 10-30s) — Ne pas utiliser comme seul moyen d'évitement de trafic aérien
  </div>

  <!-- TOOLBAR -->
  <div id="toolbar">
    <button class="tool-btn active" id="btn-refresh-now" title="Actualiser maintenant">
      🔄 Actualiser
    </button>
    <div class="tool-sep"></div>
    <button class="tool-btn active" id="btn-toggle-ground" title="Afficher/masquer les aéronefs au sol">
      🛬 Au sol
    </button>
    <div class="tool-sep"></div>
    <div id="radius-control">
      <label for="radius-input">Rayon (km)</label>
      <input type="number" id="radius-input" value="50" min="10" max="200" step="10">
    </div>
    <div class="tool-sep"></div>
    <div id="interval-control" style="display:flex;align-items:center;gap:5px;flex-shrink:0;">
      <label style="font-size:11px;color:var(--text-muted);font-weight:600;white-space:nowrap;">Refresh</label>
      <select id="refresh-select" style="background:var(--bg);border:1.5px solid var(--border);border-radius:6px;padding:4px 6px;font-size:12px;font-weight:600;color:var(--text);width:58px;">
        <option value="5">5s</option>
        <option value="10">10s</option>
        <option value="15" selected>15s</option>
        <option value="30">30s</option>
        <option value="60">60s</option>
      </select>
    </div>
    <div class="tool-sep"></div>
    <div id="countdown-wrap">
      <div id="countdown-ring">
        <svg width="30" height="30" viewBox="0 0 30 30">
          <circle class="ring-bg" cx="15" cy="15" r="12" id="ring-bg"/>
          <circle cx="15" cy="15" r="12" id="ring-progress" style="stroke-dasharray:75.4;stroke-dashoffset:0;"/>
        </svg>
        <span id="countdown-num">15</span>
      </div>
      <span id="status-text">Initialisation…</span>
    </div>
  </div>

  <!-- MAP -->
  <div id="map-container">
    <div id="map"></div>

    <!-- Légende altitude -->
    <div id="alt-legend">
      <div class="leg-title">Altitude</div>
      <div class="leg-row"><div class="leg-dot" style="background:#1D6B37;"></div><span>&lt; 500 m</span></div>
      <div class="leg-row"><div class="leg-dot" style="background:#185FA5;"></div><span>500–2000 m</span></div>
      <div class="leg-row"><div class="leg-dot" style="background:#BA7517;"></div><span>2000–5000 m</span></div>
      <div class="leg-row"><div class="leg-dot" style="background:#8B2020;"></div><span>&gt; 5000 m</span></div>
      <div class="leg-row"><div class="leg-dot" style="background:#888;"></div><span>Au sol / N/A</span></div>
    </div>

    <!-- Stats overlay -->
    <div id="stats-overlay">
      <div class="stat-row">
        <span class="stat-label">Aéronefs</span>
        <span class="stat-val" id="stat-count">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">En vol</span>
        <span class="stat-val" id="stat-airborne">—</span>
      </div>
      <div class="stat-row">
        <span class="stat-label">Mise à jour</span>
        <span class="stat-val" id="stat-time">—</span>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast"></div>
  </div>

  <!-- PANEL DÉTAIL AÉRONEF -->
  <div id="detail-panel">
    <div id="detail-panel-handle"></div>
    <button id="detail-close">✕</button>
    <h3 id="detail-title">✈️ Aéronef</h3>
    <div class="detail-grid" id="detail-grid"></div>
  </div>


</div>

<script>
// ═══════════════════════════════════════════════════════════
//  UAS Manager — Module 7 ADS-B + Carte Trafic
//  © Philippe CONTE · FRAjqq48j12nfy4c
//  Données OpenSky Network (CC-BY, délai 10-30s)
// ═══════════════════════════════════════════════════════════

const DEFAULT_LAT = 45.9523;
const DEFAULT_LON = 6.5016;
let REFRESH_INTERVAL = 15; // secondes — modifiable via sélecteur

// APIs ADS-B avec CORS activé (pas de clé requise)
// Fallback automatique si l'une est indisponible
// ─── SOURCES ADS-B (ordre de priorité, toutes CORS-OK) ───
// adsb.lol  : principale, gratuite, sans clé, CORS OK
// airplanes.live : backup fiable, CORS OK
// hellosky  : 3ème source de secours
const APIS = [
  {
    name: 'adsb.lol',
    url: (lat, lon, r) => `https://api.adsb.lol/v2/point/${lat.toFixed(4)}/${lon.toFixed(4)}/${r}`,
    parse: (data) => data.ac || [],
    toAircraft: (a) => ({
      icao:     a.hex || '?',
      callsign: (a.flight || a.r || '').trim(),
      country:  a.r || '?',
      lat:      a.lat,
      lon:      a.lon,
      alt:      a.alt_baro !== 'ground' && a.alt_baro != null
                  ? parseFloat(a.alt_baro) * 0.3048 : null,
      onGround: a.alt_baro === 'ground' || !!a.on_ground,
      speed:    a.gs ? a.gs * 0.514444 : null,
      track:    a.track ?? null,
    }),
  },
  {
    name: 'airplanes.live',
    url: (lat, lon, r) => `https://api.airplanes.live/v2/point/${lat.toFixed(4)}/${lon.toFixed(4)}/${r}`,
    parse: (data) => data.ac || [],
    toAircraft: (a) => ({
      icao:     a.hex || '?',
      callsign: (a.flight || a.r || '').trim(),
      country:  a.r || '?',
      lat:      a.lat,
      lon:      a.lon,
      alt:      a.alt_baro !== 'ground' && a.alt_baro != null
                  ? parseFloat(a.alt_baro) * 0.3048 : null,
      onGround: a.alt_baro === 'ground' || !!a.on_ground,
      speed:    a.gs ? a.gs * 0.514444 : null,
      track:    a.track ?? null,
    }),
  },
  {
    name: 'hellosky',
    url: (lat, lon, r) => `https://data.hellosky.net/api/v2/map/aircraft?lat=${lat.toFixed(4)}&lng=${lon.toFixed(4)}&radius=${r}`,
    parse: (data) => Array.isArray(data) ? data : (data.data || data.aircraft || []),
    toAircraft: (a) => ({
      icao:     a.icao || a.hex || '?',
      callsign: (a.callsign || a.flight || '').trim(),
      country:  a.country || a.registration || '?',
      lat:      a.lat || a.latitude,
      lon:      a.lng || a.lon || a.longitude,
      alt:      a.altitude != null ? parseFloat(a.altitude) : null,
      onGround: !!a.on_ground || a.altitude === 0,
      speed:    a.speed ? a.speed * 0.514444 : null,
      track:    a.heading || a.track || null,
    }),
  },
];
let currentApiIdx = 0;
let apiFailCount = 0; // nb d'échecs consécutifs toutes sources

// ─── STATE ───────────────────────────────────────────────
let state = {
  lat: DEFAULT_LAT,
  lon: DEFAULT_LON,
  radius: 50,        // km
  showGround: true,
  isLoading: false,
  lastFetch: null,
  aircraft: [],
  retryIn: 0,
};

// ─── MAP INIT ────────────────────────────────────────────
const map = L.map('map', {
  center: [DEFAULT_LAT, DEFAULT_LON],
  zoom: 9,
  zoomControl: true,
  attributionControl: true,
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18,
  attribution: '© OpenStreetMap contributors | ADS-B: OpenSky Network'
}).addTo(map);

// ─── PILOT MARKER ────────────────────────────────────────
const pilotIcon = L.divIcon({
  className: '',
  html: `<div style="
    width:28px;height:28px;
    background:var(--navy,#0C447C);
    border-radius:50%;
    border:3px solid #fff;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;
    box-shadow:0 2px 8px rgba(0,0,0,0.35);
  ">🛸</div>`,
  iconSize: [28, 28],
  iconAnchor: [14, 14],
});

let pilotMarker = L.marker([DEFAULT_LAT, DEFAULT_LON], { icon: pilotIcon, zIndexOffset: 1000 })
  .addTo(map)
  .bindPopup('<b>📍 Position pilote</b><br>Philippe CONTE<br>Thyez, Haute-Savoie');

let radiusCircle = L.circle([DEFAULT_LAT, DEFAULT_LON], {
  radius: state.radius * 1000,
  color: '#185FA5',
  fillColor: '#E6F1FB',
  fillOpacity: 0.08,
  weight: 1.5,
  dashArray: '6 4',
}).addTo(map);

// ─── AIRCRAFT LAYER ──────────────────────────────────────
const aircraftLayer = L.layerGroup().addTo(map);

function altitudeColor(alt, onGround) {
  if (onGround || alt === null) return '#888888';
  if (alt < 500)  return '#1D6B37'; // green
  if (alt < 2000) return '#185FA5'; // blue
  if (alt < 5000) return '#BA7517'; // amber
  return '#8B2020';                  // red
}

function makeAircraftIcon(heading, alt, onGround) {
  const color = altitudeColor(alt, onGround);
  const h = (heading !== null && heading !== undefined) ? heading : 0;
  return L.divIcon({
    className: '',
    html: `<div style="
      transform: rotate(${h}deg);
      color: ${color};
      font-size: 22px;
      line-height: 1;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,0.4));
      width:22px;height:22px;
      display:flex;align-items:center;justify-content:center;
    ">✈</div>`,
    iconSize: [22, 22],
    iconAnchor: [11, 11],
  });
}

// ─── OPENSKY FETCH ───────────────────────────────────────
function bbox() {
  const d = state.radius / 111.12; // rough km → deg
  return {
    lamin: state.lat - d,
    lomin: state.lon - d,
    lamax: state.lat + d,
    lomax: state.lon + d,
  };
}

// ─── FETCH ADS-B (multi-API avec fallback) ────────────────
async function fetchADSB() {
  if (state.isLoading) return;
  if (state.retryIn > 0) return;

  state.isLoading = true;
  setStatus('⏳ Chargement…', false);

  const api = APIS[currentApiIdx];
  const url = api.url(state.lat, state.lon, state.radius);

  try {
    const resp = await fetch(url, {
      signal: AbortSignal.timeout(10000),
      headers: { 'Accept': 'application/json' },
    });

    if (resp.status === 429) {
      state.isLoading = false;
      // Basculer sur l'API suivante
      currentApiIdx = (currentApiIdx + 1) % APIS.length;
      showToast(`⚠️ Limite ${api.name} — bascule sur ${APIS[currentApiIdx].name}`, 'amber');
      startRetry(15);
      return;
    }

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    const data = await resp.json();
    const raw = api.parse(data);

    // Normaliser vers format interne
    state.aircraft = raw
      .map(api.toAircraft)
      .filter(a => a.lat && a.lon);

    state.lastFetch = new Date();
    apiFailCount = 0; // reset compteur d'échecs
    renderAircraft();
    updateStats();
    setStatus(`✅ ${api.name}`, true);
    updateApiBadge(api.name, true);

  } catch (e) {
    const isTimeout = e.name === 'TimeoutError' || e.name === 'AbortError';
    const isCors = e.message.includes('Failed to fetch') || e.message.includes('Load failed');

    apiFailCount++;

    if (isCors || isTimeout) {
      // Essayer la source suivante immédiatement
      const nextIdx = (currentApiIdx + 1) % APIS.length;
      if (apiFailCount < APIS.length) {
        currentApiIdx = nextIdx;
        const reason = isCors ? 'inaccessible' : 'délai dépassé';
        showToast(`⚠️ ${api.name} ${reason} → ${APIS[currentApiIdx].name}`, 'amber');
        state.isLoading = false;
        await fetchADSB();
        return;
      } else {
        // Toutes les sources ont échoué
        apiFailCount = 0;
        currentApiIdx = 0; // repartir de la première au prochain cycle
        showToast('❌ Toutes les sources ADS-B inaccessibles', 'red');
      }
    } else {
      showToast(`❌ ${api.name} : ${e.message.slice(0,40)}`, 'red');
    }
    setStatus('⚠️ Hors ligne', false);
    updateApiBadge(api.name, false);
  } finally {
    state.isLoading = false;
  }
}

function updateApiBadge(name, ok) {
  let badge = document.getElementById('api-source-badge');
  if (!badge) {
    badge = document.createElement('div');
    badge.id = 'api-source-badge';
    badge.style.cssText = 'position:absolute;bottom:52px;right:12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:4px 10px;font-size:10px;font-weight:700;z-index:500;box-shadow:var(--shadow);';
    document.getElementById('map-container').appendChild(badge);
  }
  badge.textContent = ok ? `📡 ${name}` : `⚠️ ${name}`;
  badge.style.color = ok ? 'var(--green)' : 'var(--amber)';
}

// ─── RENDER AIRCRAFT ─────────────────────────────────────
function renderAircraft() {
  aircraftLayer.clearLayers();

  const visible = state.aircraft.filter(a => {
    if (!a.lat || !a.lon) return false;
    if (!state.showGround && a.onGround) return false;
    return true;
  });

  visible.forEach(a => {
    const icon = makeAircraftIcon(a.track, a.alt, a.onGround);
    const marker = L.marker([a.lat, a.lon], { icon }).addTo(aircraftLayer);
    marker.on('click', () => showDetail(a));
  });
}

// ─── DETAIL PANEL ────────────────────────────────────────
function showDetail(ac) {
  document.getElementById('detail-title').textContent = `✈️ ${ac.callsign || ac.icao}`;

  const altStr = ac.onGround ? '🛬 Au sol' : (ac.alt != null ? `${Math.round(ac.alt)} m` : 'N/A');
  const spdStr = ac.speed != null ? `${Math.round(ac.speed * 3.6)} km/h` : 'N/A';
  const trkStr = ac.track != null ? `${Math.round(ac.track)}°` : 'N/A';

  document.getElementById('detail-grid').innerHTML = `
    <div class="detail-cell"><div class="dc-label">ICAO24</div><div class="dc-val">${ac.icao}</div></div>
    <div class="detail-cell"><div class="dc-label">Indicatif</div><div class="dc-val">${ac.callsign || '—'}</div></div>
    <div class="detail-cell"><div class="dc-label">Pays / Immat.</div><div class="dc-val">${ac.country}</div></div>
    <div class="detail-cell"><div class="dc-label">Statut</div><div class="dc-val">${ac.onGround ? '🛬 Sol' : '🛫 En vol'}</div></div>
    <div class="detail-cell"><div class="dc-label">Altitude baro.</div><div class="dc-val">${altStr}</div></div>
    <div class="detail-cell"><div class="dc-label">Vitesse sol</div><div class="dc-val">${spdStr}</div></div>
    <div class="detail-cell"><div class="dc-label">Cap vrai</div><div class="dc-val">${trkStr}</div></div>
    <div class="detail-cell"><div class="dc-label">Position</div><div class="dc-val">${ac.lat.toFixed(4)}, ${ac.lon.toFixed(4)}</div></div>
  `;

  document.getElementById('detail-panel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
}

// ─── STATS ───────────────────────────────────────────────
function updateStats() {
  const total = state.aircraft.length;
  const airborne = state.aircraft.filter(a => !a.onGround).length;
  const t = state.lastFetch;
  const timeStr = t ? `${String(t.getHours()).padStart(2,'0')}:${String(t.getMinutes()).padStart(2,'0')}:${String(t.getSeconds()).padStart(2,'0')}` : '—';

  document.getElementById('stat-count').textContent = total;
  document.getElementById('stat-airborne').textContent = airborne;
  document.getElementById('stat-time').textContent = timeStr;
}

// ─── STATUS + TOAST ──────────────────────────────────────
function setStatus(txt, ok) {
  const el = document.getElementById('status-text');
  el.textContent = txt;
  el.style.color = ok ? 'var(--green)' : 'var(--amber)';
}

let toastTimer = null;
function showToast(msg, type = 'red') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `visible ${type === 'amber' ? 'amber' : type === 'info' ? 'info' : ''}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 4000);
}

// ─── COUNTDOWN + AUTO-REFRESH ────────────────────────────
let countdown = REFRESH_INTERVAL;
let countdownTimer = null;

const ring = document.getElementById('ring-progress');
const circ = 2 * Math.PI * 12; // r=12

function updateRing(val) {
  const offset = circ * (1 - val / REFRESH_INTERVAL);
  ring.style.strokeDashoffset = offset;
  document.getElementById('countdown-num').textContent = val;
}

function startCountdown() {
  clearInterval(countdownTimer);
  countdown = REFRESH_INTERVAL;
  updateRing(countdown);

  countdownTimer = setInterval(() => {
    if (state.retryIn > 0) {
      state.retryIn--;
      document.getElementById('countdown-num').textContent = `🔄${state.retryIn}`;
      ring.style.stroke = 'var(--amber)';
      if (state.retryIn === 0) {
        ring.style.stroke = 'var(--green)';
        fetchADSB().then(() => startCountdown());
      }
      return;
    }

    countdown--;
    updateRing(Math.max(0, countdown));

    if (countdown <= 0) {
      clearInterval(countdownTimer);
      fetchADSB().then(() => startCountdown());
    }
  }, 1000);
}

function startRetry(sec) {
  clearInterval(countdownTimer);
  state.retryIn = sec;
  ring.style.stroke = 'var(--amber)';
  countdownTimer = setInterval(() => {
    state.retryIn--;
    document.getElementById('countdown-num').textContent = `🔄${state.retryIn}`;
    if (state.retryIn <= 0) {
      clearInterval(countdownTimer);
      ring.style.stroke = 'var(--green)';
      state.retryIn = 0;
      fetchADSB().then(() => startCountdown());
    }
  }, 1000);
}

// ─── PILOT POSITION ──────────────────────────────────────
function updatePilotPosition(lat, lon) {
  state.lat = lat;
  state.lon = lon;
  pilotMarker.setLatLng([lat, lon]);
  radiusCircle.setLatLng([lat, lon]);
  radiusCircle.setRadius(state.radius * 1000);
}

// ─── GPS TEMPS RÉEL ────────────────────────────────────
let gpsWatchId = null;
let gpsActive = false;
let firstGpsFix = true;

function toggleGPS() {
  if (gpsActive) {
    stopGPS();
  } else {
    startGPS();
  }
}

function startGPS() {
  if (!navigator.geolocation) {
    showToast('⚠️ Géolocalisation non disponible', 'amber');
    return;
  }
  document.getElementById('btn-my-pos').innerHTML = '<span class="spin">⏳</span> Acquisition…';
  firstGpsFix = true;

  gpsWatchId = navigator.geolocation.watchPosition(
    (pos) => {
      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      const acc = Math.round(pos.coords.accuracy);

      updatePilotPosition(lat, lon);

      // Badge GPS visible avec précision
      const badge = document.getElementById('gps-badge');
      const accEl = document.getElementById('gps-acc');
      badge.style.display = 'flex';
      accEl.textContent = `±${acc}m`;

      // Centrer la carte seulement au premier fix
      if (firstGpsFix) {
        map.setView([lat, lon], 11);
        showToast('📍 Suivi GPS actif', 'info');
        firstGpsFix = false;
        // Relancer fetch ADS-B avec la nouvelle zone
        clearInterval(countdownTimer);
        fetchADSB().then(() => startCountdown());
      }

      gpsActive = true;
      document.getElementById('btn-my-pos').textContent = '⏹ Arrêter GPS';
      document.getElementById('btn-my-pos').style.background = 'rgba(29,107,55,0.4)';
    },
    (err) => {
      const msgs = {1:'GPS refusé', 2:'GPS indisponible', 3:'Délai GPS dépassé'};
      showToast(`❌ ${msgs[err.code] || 'Erreur GPS'}`, 'red');
      stopGPS();
    },
    { enableHighAccuracy: true, maximumAge: 2000, timeout: 15000 }
  );
}

function stopGPS() {
  if (gpsWatchId !== null) {
    navigator.geolocation.clearWatch(gpsWatchId);
    gpsWatchId = null;
  }
  gpsActive = false;
  firstGpsFix = true;
  document.getElementById('btn-my-pos').textContent = '📍 Suivi GPS';
  document.getElementById('btn-my-pos').style.background = '';
  document.getElementById('gps-badge').style.display = 'none';
  showToast('⏹ Suivi GPS arrêté', 'amber');
}

// Alias pour compatibilité
function goToMyPosition() { toggleGPS(); }

// ─── RADIUS ──────────────────────────────────────────────
document.getElementById('radius-input').addEventListener('change', (e) => {
  const v = parseInt(e.target.value, 10);
  if (v >= 10 && v <= 200) {
    state.radius = v;
    radiusCircle.setRadius(v * 1000);
    // Ajuster zoom selon rayon
    const zoom = v < 30 ? 11 : v < 80 ? 9 : 7;
    map.setView([state.lat, state.lon], zoom);
  }
});

// ─── TOGGLE AU SOL ───────────────────────────────────────
const btnGround = document.getElementById('btn-toggle-ground');
btnGround.addEventListener('click', () => {
  state.showGround = !state.showGround;
  btnGround.classList.toggle('active', state.showGround);
  btnGround.textContent = state.showGround ? '🛬 Au sol' : '🛫 Vol seul.';
  renderAircraft();
});

// ─── REFRESH MANUAL ──────────────────────────────────────
document.getElementById('btn-refresh-now').addEventListener('click', () => {
  clearInterval(countdownTimer);
  fetchADSB().then(() => startCountdown());
});

// ─── REFRESH INTERVAL SELECTOR ───────────────────────────
document.getElementById('refresh-select').addEventListener('change', (e) => {
  REFRESH_INTERVAL = parseInt(e.target.value);
  // Mettre à jour le stroke-dasharray du ring selon le nouvel intervalle
  const r = 12;
  const newCirc = 2 * Math.PI * r;
  document.getElementById('ring-progress').style.strokeDasharray = newCirc;
  clearInterval(countdownTimer);
  startCountdown();
  showToast(`🔄 Refresh toutes les ${REFRESH_INTERVAL}s`, 'info');
});

// ─── MY POSITION ─────────────────────────────────────────
document.getElementById('btn-my-pos').addEventListener('click', goToMyPosition);

// ─── DETAIL CLOSE ────────────────────────────────────────
document.getElementById('detail-close').addEventListener('click', closeDetail);
document.getElementById('detail-panel-handle').addEventListener('click', closeDetail);

// ─── MAP CLICK : fermer panel ────────────────────────────
map.on('click', closeDetail);

// ─── INIT ────────────────────────────────────────────────
map.setView([DEFAULT_LAT, DEFAULT_LON], 9);

// iOS Safari fix: force Leaflet to recalculate map size after layout
setTimeout(() => {
  map.invalidateSize({ animate: false });
}, 100);
setTimeout(() => {
  map.invalidateSize({ animate: false });
}, 500);

// Lire le refresh depuis config si dispo
try {
  const c = JSON.parse(localStorage.getItem('uas_config') || '{}');
  if (c.thr_rayon) {
    state.radius = parseInt(c.thr_rayon);
    document.getElementById('radius-input').value = state.radius;
    radiusCircle.setRadius(state.radius * 1000);
  }
} catch {}

// Arrêter le GPS proprement en quittant la page
window.addEventListener('beforeunload', () => { if (gpsWatchId !== null) navigator.geolocation.clearWatch(gpsWatchId); });
window.addEventListener('pagehide', () => { if (gpsWatchId !== null) navigator.geolocation.clearWatch(gpsWatchId); });

showToast('📡 Connexion OpenSky…', 'info');
fetchADSB().then(() => startCountdown());
</script>
